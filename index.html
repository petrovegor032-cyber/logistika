<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AudioDisk - РАЦИЯ (без Storage)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 20px;
            margin: 16px 0;
            backdrop-filter: blur(10px);
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            margin: 8px 8px 0 0;
        }
        button.danger { background: #dc3545; }
        button.success { background: #28a745; }
        button.racia-active { background: #4caf50; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 16px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .log {
            background: #0a0a0a;
            border-radius: 16px;
            padding: 12px;
            font-family: monospace;
            font-size: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        .status {
            padding: 10px;
            border-radius: 16px;
            text-align: center;
            font-weight: bold;
        }
        .status.idle { background: #333; }
        .status.talking { background: #4caf50; animation: pulse 1s infinite; }
        .mic-level {
            height: 4px;
            background: #4caf50;
            width: 0%;
            transition: width 0.1s;
            margin-top: 8px;
            border-radius: 2px;
        }
        .peer { border-left: 3px solid #667eea; padding-left: 16px; margin: 12px 0; cursor: pointer; }
        .message-bubble {
            background: rgba(102,126,234,0.3);
            border-radius: 16px;
            padding: 8px 12px;
            margin: 4px 0;
            font-size: 12px;
        }
        audio { width: 100%; margin-top: 4px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📻 РАЦИЯ (без CORS)</h1>
    
    <div class="card" id="authPanel">
        <input type="text" id="loginInput" placeholder="Логин">
        <input type="password" id="passwordInput" placeholder="Пароль">
        <button onclick="register()">Регистрация</button>
        <button onclick="login()" class="success">Вход</button>
    </div>
    
    <div id="mainPanel" style="display:none;">
        <div class="card">
            <div style="display: flex; justify-content: space-between;">
                <h3>👤 <span id="myLogin">-</span></h3>
                <div id="raciaStatus" class="status idle">⚪ Режим ожидания</div>
            </div>
            <div class="mic-level" id="micLevel"></div>
        </div>
        
        <div class="card">
            <h3>📞 Собеседник</h3>
            <input type="text" id="targetLogin" placeholder="Логин для связи">
            <div style="display: flex; gap: 8px;">
                <button id="raciaBtn" onclick="toggleRacia()">🎙️ ВКЛЮЧИТЬ РАЦИЮ</button>
                <button id="stopRaciaBtn" onclick="stopRacia()" class="danger" style="display:none;">🔴 ВЫКЛЮЧИТЬ</button>
            </div>
        </div>
        
        <div class="card">
            <h3>📋 Другие пользователи</h3>
            <div id="usersList"></div>
        </div>
        
        <div class="card">
            <h3>📋 СООБЩЕНИЯ</h3>
            <div id="messagesList" class="log" style="max-height: 200px;"></div>
        </div>
        
        <div class="card">
            <h3>📋 ЛОГ</h3>
            <button onclick="clearLog()">Очистить</button>
            <div id="log" class="log"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCCIY9lL15FpypsI310HCuTxQSwkpCpuiE",
        authDomain: "audiozvonok-b340d.firebaseapp.com",
        databaseURL: "https://audiozvonok-b340d-default-rtdb.firebaseio.com",
        projectId: "audiozvonok-b340d",
        storageBucket: "audiozvonok-b340d.firebasestorage.app"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentUser = null;
    let currentChannel = null;
    let raciaActive = false;
    let mediaStream = null;
    let recordingLoop = null;
    let audioContext = null;
    let analyserNode = null;
    let animationFrame = null;
    
    function addLog(msg, type = 'info') {
        const logDiv = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        const colors = { info: '#aaa', success: '#4caf50', error: '#f44336', warn: '#ff9800', call: '#2196f3', audio: '#9c27b0' };
        logDiv.innerHTML += `<div style="color: ${colors[type] || colors.info}; border-bottom:1px solid #222; padding:4px 0;">[${time}] ${msg}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(`[${time}] ${msg}`);
    }
    
    function addMessage(msg, type = 'in') {
        const container = document.getElementById('messagesList');
        const time = new Date().toLocaleTimeString();
        container.innerHTML += `<div class="message-bubble" style="background: ${type === 'out' ? 'rgba(102,126,234,0.5)' : 'rgba(255,255,255,0.1)'}">
            <strong>${type === 'out' ? '📤 Я' : '📥 Собеседник'}</strong> ${time}<br>
            <audio controls src="${msg.url}" preload="auto"></audio>
        </div>`;
        container.scrollTop = container.scrollHeight;
        
        // Автовоспроизведение
        const audio = container.querySelectorAll('audio:last-child')[0];
        if (audio) audio.play().catch(e => addLog(`⚠️ Автовоспроизведение: ${e.message}`, 'warn'));
    }
    
    function clearLog() {
        document.getElementById('log').innerHTML = '';
        addLog('Лог очищен');
    }
    
    async function register() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return addLog('Введите логин и пароль', 'error');
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (snapshot.exists()) return addLog('Логин занят', 'error');
        const userId = Date.now().toString();
        await db.ref(`users/${userId}`).set({ login, password: btoa(password), name: login, created_at: Date.now(), online: true });
        currentUser = { id: userId, login, name: login };
        localStorage.setItem('user', JSON.stringify(currentUser));
        addLog(`✅ Регистрация: ${login}`, 'success');
        afterLogin();
    }
    
    async function login() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return addLog('Введите логин и пароль', 'error');
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (!snapshot.exists()) return addLog('Пользователь не найден', 'error');
        let userId, userData;
        snapshot.forEach(child => { userId = child.key; userData = child.val(); });
        if (btoa(password) !== userData.password) return addLog('Неверный пароль', 'error');
        currentUser = { id: userId, login, name: userData.name };
        localStorage.setItem('user', JSON.stringify(currentUser));
        await db.ref(`users/${userId}/online`).set(true);
        addLog(`✅ Вход: ${login}`, 'success');
        afterLogin();
    }
    
    async function afterLogin() {
        document.getElementById('authPanel').style.display = 'none';
        document.getElementById('mainPanel').style.display = 'block';
        document.getElementById('myLogin').innerText = currentUser.login;
        await loadUsers();
        setupRaciaListener();
        addLog(`🎙️ Рация готова. Выбери собеседника и включи рацию.`, 'success');
    }
    
    async function loadUsers() {
        const snapshot = await db.ref('users').once('value');
        let html = '';
        snapshot.forEach(child => {
            const user = child.val();
            if (user.login !== currentUser.login) {
                html += `<div class="peer" onclick="selectTarget('${user.login}')">
                    <strong>${user.login}</strong> <span style="color:${user.online ? '#4caf50' : '#888'}">●</span>
                    <span style="float:right;">🎙️ Выбрать</span>
                </div>`;
            }
        });
        document.getElementById('usersList').innerHTML = html || '<div>Нет других пользователей</div>';
    }
    
    function selectTarget(login) {
        document.getElementById('targetLogin').value = login;
        addLog(`🎯 Выбран собеседник: ${login}`, 'success');
    }
    
    // ========== РАЦИЯ ==========
    async function toggleRacia() {
        if (raciaActive) stopRacia();
        else startRacia();
    }
    
    async function startRacia() {
        const targetLogin = document.getElementById('targetLogin').value.trim();
        if (!targetLogin) return addLog('❌ Выберите собеседника', 'error');
        
        const snapshot = await db.ref('users').orderByChild('login').equalTo(targetLogin).once('value');
        if (!snapshot.exists()) return addLog(`❌ ${targetLogin} не найден`, 'error');
        
        let targetId;
        snapshot.forEach(child => { targetId = child.key; });
        currentChannel = { id: targetId, login: targetLogin };
        
        addLog(`🎙️ Включаем рацию с ${targetLogin}...`, 'call');
        
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            addLog(`✅ Микрофон готов`, 'success');
            
            // Уровень микрофона
            audioContext = new AudioContext();
            const source = audioContext.createMediaStreamSource(mediaStream);
            analyserNode = audioContext.createAnalyser();
            analyserNode.fftSize = 256;
            source.connect(analyserNode);
            
            function updateMicLevel() {
                if (!raciaActive) return;
                const dataArray = new Uint8Array(analyserNode.frequencyBinCount);
                analyserNode.getByteTimeDomainData(dataArray);
                let max = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    const v = (dataArray[i] - 128) / 128;
                    max = Math.max(max, Math.abs(v));
                }
                document.getElementById('micLevel').style.width = Math.min(100, max * 100) + '%';
                animationFrame = requestAnimationFrame(updateMicLevel);
            }
            updateMicLevel();
            
            // Уведомляем собеседника
            await db.ref(`racia/${targetId}/active`).set({
                from: currentUser.id,
                fromLogin: currentUser.login,
                active: true,
                timestamp: Date.now()
            });
            
            raciaActive = true;
            document.getElementById('raciaBtn').style.display = 'none';
            document.getElementById('stopRaciaBtn').style.display = 'inline-block';
            document.getElementById('raciaStatus').className = 'status talking';
            document.getElementById('raciaStatus').innerHTML = '🎙️ РАЦИЯ АКТИВНА';
            
            startRecordingLoop();
            
        } catch(e) {
            addLog(`❌ Ошибка: ${e.message}`, 'error');
        }
    }
    
    async function startRecordingLoop() {
        if (!raciaActive || !mediaStream) return;
        
        const chunks = [];
        const recorder = new MediaRecorder(mediaStream);
        
        recorder.ondataavailable = (e) => {
            if (e.data.size > 0) chunks.push(e.data);
        };
        
        recorder.onstop = async () => {
            if (chunks.length === 0) {
                if (raciaActive) setTimeout(() => startRecordingLoop(), 100);
                return;
            }
            
            const blob = new Blob(chunks, { type: 'audio/webm' });
            if (blob.size > 500 && raciaActive && currentChannel) {
                addLog(`📤 Отправка фрагмента (${Math.round(blob.size/1000)}KB)`, 'audio');
                
                // Конвертируем в base64 для отправки в Database
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const base64 = ev.target.result;
                    
                    await db.ref(`racia/${currentChannel.id}/messages`).push({
                        from: currentUser.id,
                        fromLogin: currentUser.login,
                        data: base64,
                        timestamp: Date.now()
                    });
                    
                    // Показываем в своем логе
                    addMessage({ url: base64 }, 'out');
                };
                reader.readAsDataURL(blob);
            }
            
            if (raciaActive) setTimeout(() => startRecordingLoop(), 100);
        };
        
        recorder.start();
        setTimeout(() => {
            if (recorder.state === 'recording') recorder.stop();
        }, 950);
    }
    
    function setupRaciaListener() {
        if (!currentUser) return;
        
        db.ref(`racia/${currentUser.id}/messages`).on('child_added', (snap) => {
            const msg = snap.val();
            if (msg && msg.from !== currentUser.id) {
                addLog(`📥 Получено от ${msg.fromLogin}`, 'audio');
                addMessage({ url: msg.data }, 'in');
                snap.ref.remove();
            }
        });
        
        db.ref(`racia/${currentUser.id}/active`).on('value', (snap) => {
            const data = snap.val();
            if (data && data.active && !raciaActive && data.from !== currentUser.id) {
                addLog(`📞 ${data.fromLogin} включает рацию!`, 'call');
                if (confirm(`${data.fromLogin} хочет говорить. Разрешить?`)) {
                    document.getElementById('targetLogin').value = data.fromLogin;
                    startRacia();
                }
            }
        });
    }
    
    function stopRacia() {
        addLog(`🔴 Остановка рации...`);
        raciaActive = false;
        
        if (recordingLoop) clearTimeout(recordingLoop);
        if (animationFrame) cancelAnimationFrame(animationFrame);
        if (audioContext) audioContext.close();
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        
        mediaStream = null;
        audioContext = null;
        
        if (currentChannel) db.ref(`racia/${currentChannel.id}/active`).remove();
        
        document.getElementById('raciaBtn').style.display = 'inline-block';
        document.getElementById('stopRaciaBtn').style.display = 'none';
        document.getElementById('raciaStatus').className = 'status idle';
        document.getElementById('raciaStatus').innerHTML = '⚪ Режим ожидания';
        document.getElementById('micLevel').style.width = '0%';
        
        currentChannel = null;
        addLog(`✅ Рация остановлена`, 'info');
    }
    
    const saved = localStorage.getItem('user');
    if (saved) {
        currentUser = JSON.parse(saved);
        db.ref(`users/${currentUser.id}/online`).set(true);
        afterLogin();
    }
    
    addLog(`🚀 РАЦИЯ ЗАПУЩЕНА (без Storage)`, 'success');
</script>
</body>
</html>
