<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AudioDisk - ЗВОНОК (рация)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 20px;
            margin: 16px 0;
            backdrop-filter: blur(10px);
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            margin: 8px 8px 0 0;
        }
        button.danger { background: #dc3545; }
        button.success { background: #28a745; }
        button.call-btn { background: #4caf50; font-size: 18px; padding: 16px 32px; }
        button.call-active { background: #dc3545; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 16px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
        }
        .log {
            background: #0a0a0a;
            border-radius: 16px;
            padding: 12px;
            font-family: monospace;
            font-size: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        .status {
            padding: 10px;
            border-radius: 16px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .status.idle { background: #333; }
        .status.calling { background: #ff9800; animation: pulse 1s infinite; }
        .status.talking { background: #4caf50; }
        .mic-level { height: 4px; background: #4caf50; width: 0%; transition: width 0.1s; margin-top: 8px; border-radius: 2px; }
        .peer { border-left: 3px solid #667eea; padding-left: 16px; margin: 12px 0; cursor: pointer; padding: 8px; }
        .peer:hover { background: rgba(255,255,255,0.05); }
        .incoming-call {
            background: #ff9800;
            padding: 15px;
            border-radius: 24px;
            margin: 12px 0;
            text-align: center;
            animation: pulse 1s infinite;
        }
        .incoming-call button { margin: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📞 ЗВОНОК (рация)</h1>
    <p style="opacity:0.7;">Нажми "Позвонить" → собеседник принимает → говорите</p>
    
    <div class="card" id="authPanel">
        <input type="text" id="loginInput" placeholder="Логин">
        <input type="password" id="passwordInput" placeholder="Пароль">
        <button onclick="register()">Регистрация</button>
        <button onclick="login()" class="success">Вход</button>
    </div>
    
    <div id="mainPanel" style="display:none;">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>👤 <span id="myLogin">-</span></h3>
                <div id="callStatus" class="status idle">⚪ Не в звонке</div>
            </div>
            <div class="mic-level" id="micLevel"></div>
        </div>
        
        <div class="card">
            <h3>📞 Кому позвонить?</h3>
            <input type="text" id="targetLogin" placeholder="Логин собеседника">
            <button id="callBtn" class="call-btn" onclick="makeCall()">📞 ПОЗВОНИТЬ</button>
            <button id="endCallBtn" onclick="endCall()" class="danger call-btn" style="display:none;">🔴 ЗАВЕРШИТЬ</button>
        </div>
        
        <div class="card">
            <h3>📋 Онлайн</h3>
            <div id="usersList"></div>
        </div>
        
        <div class="card">
            <h3>📋 ЛОГ ЗВОНКА</h3>
            <button onclick="clearLog()">Очистить</button>
            <div id="log" class="log"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCCIY9lL15FpypsI310HCuTxQSwkpCpuiE",
        authDomain: "audiozvonok-b340d.firebaseapp.com",
        databaseURL: "https://audiozvonok-b340d-default-rtdb.firebaseio.com",
        projectId: "audiozvonok-b340d",
        storageBucket: "audiozvonok-b340d.firebasestorage.app"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentUser = null;
    let currentCall = null;
    let callActive = false;
    let mediaStream = null;
    let recordingTimer = null;
    let audioContext = null;
    let analyserNode = null;
    let animationFrame = null;
    let globalAudio = null;
    let soundReady = false;
    
    function addLog(msg, type = 'info') {
        const logDiv = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        const colors = { info: '#aaa', success: '#4caf50', error: '#f44336', warn: '#ff9800', call: '#2196f3', audio: '#9c27b0' };
        logDiv.innerHTML += `<div style="color: ${colors[type] || colors.info}; border-bottom:1px solid #222; padding:4px 0;">[${time}] ${msg}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(`[${time}] ${msg}`);
    }
    
    function clearLog() {
        document.getElementById('log').innerHTML = '';
        addLog('Лог очищен');
    }
    
    async function register() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return addLog('Введите логин и пароль', 'error');
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (snapshot.exists()) return addLog('Логин занят', 'error');
        const userId = Date.now().toString();
        await db.ref(`users/${userId}`).set({ login, password: btoa(password), name: login, created_at: Date.now(), online: true });
        currentUser = { id: userId, login, name: login };
        localStorage.setItem('user', JSON.stringify(currentUser));
        addLog(`✅ Регистрация: ${login}`, 'success');
        afterLogin();
    }
    
    async function login() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return addLog('Введите логин и пароль', 'error');
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (!snapshot.exists()) return addLog('Пользователь не найден', 'error');
        let userId, userData;
        snapshot.forEach(child => { userId = child.key; userData = child.val(); });
        if (btoa(password) !== userData.password) return addLog('Неверный пароль', 'error');
        currentUser = { id: userId, login, name: userData.name };
        localStorage.setItem('user', JSON.stringify(currentUser));
        await db.ref(`users/${userId}/online`).set(true);
        addLog(`✅ Вход: ${login}`, 'success');
        afterLogin();
    }
    
    async function afterLogin() {
        document.getElementById('authPanel').style.display = 'none';
        document.getElementById('mainPanel').style.display = 'block';
        document.getElementById('myLogin').innerText = currentUser.login;
        
        globalAudio = new Audio();
        globalAudio.volume = 1.0;
        
        await loadUsers();
        setupCallListener();
        addLog(`🎙️ Готов к звонкам. Нажми "Позвонить"`, 'success');
    }
    
    async function loadUsers() {
        const snapshot = await db.ref('users').once('value');
        let html = '';
        snapshot.forEach(child => {
            const user = child.val();
            if (user.login !== currentUser.login) {
                html += `<div class="peer" onclick="document.getElementById('targetLogin').value='${user.login}'">
                    <strong>${user.login}</strong> 
                    <span style="color:${user.online ? '#4caf50' : '#888'}">${user.online ? '● онлайн' : '○ офлайн'}</span>
                    <span style="float:right;">📞</span>
                </div>`;
            }
        });
        document.getElementById('usersList').innerHTML = html || '<div>Нет других пользователей</div>';
    }
    
    // ========== ЗВОНОК ==========
    async function makeCall() {
        if (callActive) return addLog('Уже в звонке', 'warn');
        
        const targetLogin = document.getElementById('targetLogin').value.trim();
        if (!targetLogin) return addLog('Введите логин', 'error');
        
        const snapshot = await db.ref('users').orderByChild('login').equalTo(targetLogin).once('value');
        if (!snapshot.exists()) return addLog(`❌ ${targetLogin} не найден`, 'error');
        
        let targetId;
        snapshot.forEach(child => { targetId = child.key; });
        
        currentCall = { id: targetId, login: targetLogin };
        const sessionId = Date.now().toString();
        
        addLog(`📞 Звоним ${targetLogin}...`, 'call');
        document.getElementById('callStatus').className = 'status calling';
        document.getElementById('callStatus').innerHTML = '📞 ЗВОНИМ...';
        document.getElementById('callBtn').style.display = 'none';
        
        await db.ref(`calls/${sessionId}`).set({
            from: currentUser.id,
            fromLogin: currentUser.login,
            to: targetId,
            toLogin: targetLogin,
            status: 'ringing',
            timestamp: Date.now()
        });
        
        // Ждем ответ
        const ref = db.ref(`calls/${sessionId}`);
        const checkInterval = setInterval(async () => {
            const snap = await ref.once('value');
            const data = snap.val();
            if (data?.status === 'accepted') {
                clearInterval(checkInterval);
                addLog(`✅ ${targetLogin} принял звонок!`, 'success');
                await startCallSession(sessionId, targetId, targetLogin);
                await ref.remove();
            } else if (data?.status === 'rejected') {
                clearInterval(checkInterval);
                addLog(`❌ ${targetLogin} отклонил`, 'error');
                endCall();
            }
        }, 500);
        
        setTimeout(() => {
            clearInterval(checkInterval);
            if (!callActive) {
                addLog(`⏰ Нет ответа`, 'warn');
                ref.remove();
                endCall();
            }
        }, 30000);
    }
    
    function setupCallListener() {
        db.ref('calls').orderByChild('to').equalTo(currentUser.id).on('child_added', (snap) => {
            const call = snap.val();
            if (call && call.status === 'ringing' && !callActive) {
                showIncomingCall(snap.key, call.from, call.fromLogin);
            }
        });
    }
    
    function showIncomingCall(sessionId, fromId, fromLogin) {
        const container = document.getElementById('usersList');
        const incomingDiv = document.createElement('div');
        incomingDiv.className = 'incoming-call';
        incomingDiv.id = 'incoming_' + sessionId;
        incomingDiv.innerHTML = `
            <strong>📞 ВХОДЯЩИЙ ЗВОНОК</strong><br>
            от ${fromLogin}<br><br>
            <button onclick="acceptCall('${sessionId}', '${fromId}', '${fromLogin}')" class="success">✅ Ответить</button>
            <button onclick="rejectCall('${sessionId}')" class="danger">❌ Отклонить</button>
        `;
        container.prepend(incomingDiv);
        addLog(`📞 Входящий звонок от ${fromLogin}`, 'call');
    }
    
    async function acceptCall(sessionId, fromId, fromLogin) {
        document.getElementById('incoming_' + sessionId)?.remove();
        await db.ref(`calls/${sessionId}/status`).set('accepted');
        addLog(`✅ Принимаем звонок от ${fromLogin}`, 'success');
        currentCall = { id: fromId, login: fromLogin };
        await startCallSession(sessionId, fromId, fromLogin);
    }
    
    async function rejectCall(sessionId) {
        document.getElementById('incoming_' + sessionId)?.remove();
        await db.ref(`calls/${sessionId}/status`).set('rejected');
        addLog(`❌ Звонок отклонен`, 'error');
    }
    
    async function startCallSession(sessionId, targetId, targetLogin) {
        if (callActive) return;
        callActive = true;
        
        document.getElementById('callStatus').className = 'status talking';
        document.getElementById('callStatus').innerHTML = '🎙️ РАЗГОВОР';
        document.getElementById('callBtn').style.display = 'none';
        document.getElementById('endCallBtn').style.display = 'inline-block';
        
        // Активируем звук (короткий писк для разрешения)
        try {
            const beep = new Audio();
            beep.src = "data:audio/wav;base64,U3RlYWx0aCBibG9i";
            beep.volume = 0.01;
            await beep.play();
            soundReady = true;
            addLog('🔊 Звук активирован', 'success');
        } catch(e) {
            addLog(`⚠️ Нажми на экран для звука`, 'warn');
        }
        
        // Запрашиваем микрофон
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        addLog(`🎤 Микрофон готов`, 'success');
        
        // Уровень микрофона
        audioContext = new AudioContext();
        const source = audioContext.createMediaStreamSource(mediaStream);
        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 256;
        source.connect(analyserNode);
        
        function updateMicLevel() {
            if (!callActive) return;
            const dataArray = new Uint8Array(analyserNode.frequencyBinCount);
            analyserNode.getByteTimeDomainData(dataArray);
            let max = 0;
            for (let i = 0; i < dataArray.length; i++) {
                const v = (dataArray[i] - 128) / 128;
                max = Math.max(max, Math.abs(v));
            }
            document.getElementById('micLevel').style.width = Math.min(100, max * 100) + '%';
            animationFrame = requestAnimationFrame(updateMicLevel);
        }
        updateMicLevel();
        
        // Слушаем сообщения от собеседника
        db.ref(`call_messages/${currentUser.id}`).on('child_added', (snap) => {
            const msg = snap.val();
            if (msg && msg.from !== currentUser.id && callActive) {
                addLog(`📥 Получено от ${msg.fromLogin}`, 'audio');
                if (soundReady && globalAudio) {
                    globalAudio.src = msg.data;
                    globalAudio.play().catch(e => addLog(`⚠️ ${e.message}`, 'warn'));
                }
                snap.ref.remove();
            }
        });
        
        // Запускаем запись и отправку (0.5 сек)
        startRecording(targetId);
    }
    
    async function startRecording(targetId) {
        if (!callActive || !mediaStream) return;
        
        const chunks = [];
        const recorder = new MediaRecorder(mediaStream);
        
        recorder.ondataavailable = (e) => {
            if (e.data.size > 0) chunks.push(e.data);
        };
        
        recorder.onstop = async () => {
            if (chunks.length === 0) {
                if (callActive) setTimeout(() => startRecording(targetId), 50);
                return;
            }
            
            const blob = new Blob(chunks, { type: 'audio/webm' });
            if (blob.size > 500 && callActive) {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    await db.ref(`call_messages/${targetId}`).push({
                        from: currentUser.id,
                        fromLogin: currentUser.login,
                        data: ev.target.result,
                        timestamp: Date.now()
                    });
                };
                reader.readAsDataURL(blob);
            }
            
            if (callActive) setTimeout(() => startRecording(targetId), 50);
        };
        
        recorder.start();
        setTimeout(() => {
            if (recorder.state === 'recording') recorder.stop();
        }, 450); // 0.5 секунды
    }
    
    async function endCall() {
        addLog(`🔴 Завершение звонка...`);
        callActive = false;
        
        if (recordingTimer) clearTimeout(recordingTimer);
        if (animationFrame) cancelAnimationFrame(animationFrame);
        if (audioContext) await audioContext.close();
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        
        mediaStream = null;
        audioContext = null;
        analyserNode = null;
        
        document.getElementById('callStatus').className = 'status idle';
        document.getElementById('callStatus').innerHTML = '⚪ Не в звонке';
        document.getElementById('callBtn').style.display = 'inline-block';
        document.getElementById('endCallBtn').style.display = 'none';
        document.getElementById('micLevel').style.width = '0%';
        
        currentCall = null;
        addLog(`✅ Звонок завершен`, 'info');
    }
    
    const saved = localStorage.getItem('user');
    if (saved) {
        currentUser = JSON.parse(saved);
        db.ref(`users/${currentUser.id}/online`).set(true);
        afterLogin();
    }
    
    addLog(`🚀 ЗВОНОК-РАЦИЯ ЗАПУЩЕНА`, 'success');
    addLog(`📌 Просто нажми "Позвонить" → собеседник принимает → говорите`, 'call');
</script>
</body>
</html>
