<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AudioDisk - WebRTC Звонки (с кнопкой звука)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 20px;
            margin: 16px 0;
            backdrop-filter: blur(10px);
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            margin: 8px 8px 0 0;
        }
        button.danger { background: #dc3545; }
        button.success { background: #28a745; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 16px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .log {
            background: #0a0a0a;
            border-radius: 16px;
            padding: 12px;
            font-family: monospace;
            font-size: 10px;
            max-height: 300px;
            overflow-y: auto;
        }
        .status {
            padding: 10px;
            border-radius: 16px;
            text-align: center;
            font-weight: bold;
            transition: all 0.3s;
        }
        .status.idle { background: #333; }
        .status.calling { background: #ff9800; }
        .status.talking { background: #4caf50; }
        .status.waiting-sound { background: #ff9800; cursor: pointer; }
        .peer { border-left: 3px solid #667eea; padding-left: 16px; margin: 12px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>📞 WebRTC Звонки</h1>
    <p style="opacity:0.7;">🔊 Нажми на экран или на статус чтобы включить звук</p>
    
    <div class="card" id="authPanel">
        <input type="text" id="loginInput" placeholder="Логин">
        <input type="password" id="passwordInput" placeholder="Пароль">
        <button onclick="register()">Регистрация</button>
        <button onclick="login()" class="success">Вход</button>
    </div>
    
    <div id="mainPanel" style="display:none;">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>👤 <span id="myLogin">-</span></h3>
                <div id="callStatus" class="status idle">⚪ Ожидание</div>
            </div>
        </div>
        
        <div class="card">
            <input type="text" id="targetLogin" placeholder="Логин собеседника">
            <div style="display: flex; gap: 8px;">
                <button id="callBtn" onclick="startCall()">📞 ПОЗВОНИТЬ</button>
                <button id="endCallBtn" onclick="endCall()" class="danger" style="display:none;">🔴 ЗАВЕРШИТЬ</button>
            </div>
        </div>
        
        <div class="card">
            <h3>📋 Другие пользователи</h3>
            <div id="usersList"></div>
        </div>
        
        <div class="card">
            <h3>📋 ЛОГ</h3>
            <button onclick="clearLog()">Очистить</button>
            <div id="log" class="log"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCCIY9lL15FpypsI310HCuTxQSwkpCpuiE",
        authDomain: "audiozvonok-b340d.firebaseapp.com",
        databaseURL: "https://audiozvonok-b340d-default-rtdb.firebaseio.com",
        projectId: "audiozvonok-b340d",
        storageBucket: "audiozvonok-b340d.firebasestorage.app"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentUser = null;
    let currentCallWith = null;
    let isCallActive = false;
    let localStream = null;
    let peerConnection = null;
    let currentSessionId = null;
    
    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' },
            { urls: 'stun:stun4.l.google.com:19302' }
        ]
    };
    
    function addLog(msg, type = 'info') {
        const logDiv = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        const colors = { info: '#aaa', success: '#4caf50', error: '#f44336', warn: '#ff9800', call: '#2196f3' };
        logDiv.innerHTML += `<div style="color: ${colors[type] || colors.info}; border-bottom:1px solid #222; padding:4px 0;">[${time}] ${msg}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(`[${time}] ${msg}`);
    }
    
    function clearLog() {
        document.getElementById('log').innerHTML = '';
        addLog('Лог очищен');
    }
    
    async function register() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return addLog('Введите логин и пароль', 'error');
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (snapshot.exists()) return addLog('Логин занят', 'error');
        const userId = Date.now().toString();
        await db.ref(`users/${userId}`).set({ login, password: btoa(password), name: login, created_at: Date.now(), online: true });
        currentUser = { id: userId, login, name: login };
        localStorage.setItem('user', JSON.stringify(currentUser));
        addLog(`✅ Регистрация: ${login}`, 'success');
        afterLogin();
    }
    
    async function login() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return addLog('Введите логин и пароль', 'error');
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (!snapshot.exists()) return addLog('Пользователь не найден', 'error');
        let userId, userData;
        snapshot.forEach(child => { userId = child.key; userData = child.val(); });
        if (btoa(password) !== userData.password) return addLog('Неверный пароль', 'error');
        currentUser = { id: userId, login, name: userData.name };
        localStorage.setItem('user', JSON.stringify(currentUser));
        await db.ref(`users/${userId}/online`).set(true);
        addLog(`✅ Вход: ${login}`, 'success');
        afterLogin();
    }
    
    async function afterLogin() {
        document.getElementById('authPanel').style.display = 'none';
        document.getElementById('mainPanel').style.display = 'block';
        document.getElementById('myLogin').innerText = currentUser.login;
        await loadUsers();
        setupCallListener();
        addLog(`🎤 Готов к звонкам`, 'success');
    }
    
    async function loadUsers() {
        const snapshot = await db.ref('users').once('value');
        let html = '';
        snapshot.forEach(child => {
            const user = child.val();
            if (user.login !== currentUser.login) {
                html += `<div class="peer"><strong>${user.login}</strong> <span style="color:${user.online ? '#4caf50' : '#888'}">●</span>
                    <button onclick="callTo('${user.login}')" style="padding:6px 12px; font-size:12px;">📞</button></div>`;
            }
        });
        document.getElementById('usersList').innerHTML = html || '<div>Нет других пользователей</div>';
    }
    
    function callTo(login) {
        document.getElementById('targetLogin').value = login;
        startCall();
    }
    
    // ========== ЗВОНОК ==========
    async function startCall() {
        if (isCallActive) return addLog('Уже в звонке', 'warn');
        
        const targetLogin = document.getElementById('targetLogin').value.trim();
        if (!targetLogin) return addLog('Введите логин', 'error');
        
        const snapshot = await db.ref('users').orderByChild('login').equalTo(targetLogin).once('value');
        if (!snapshot.exists()) return addLog(`❌ ${targetLogin} не найден`, 'error');
        
        let targetId;
        snapshot.forEach(child => { targetId = child.key; });
        
        currentSessionId = Date.now().toString();
        currentCallWith = { id: targetId, login: targetLogin };
        
        addLog(`📞 Звоним ${targetLogin}...`, 'call');
        document.getElementById('callStatus').className = 'status calling';
        document.getElementById('callStatus').innerHTML = '📞 ЗВОНИМ...';
        
        await db.ref(`call_sessions/${currentSessionId}`).set({
            callerId: currentUser.id,
            callerLogin: currentUser.login,
            calleeId: targetId,
            calleeLogin: targetLogin,
            status: 'ringing',
            timestamp: Date.now()
        });
        
        // Ждем ответ
        const sessionRef = db.ref(`call_sessions/${currentSessionId}`);
        const checkInterval = setInterval(async () => {
            const snap = await sessionRef.once('value');
            const data = snap.val();
            if (data && data.status === 'accepted') {
                clearInterval(checkInterval);
                addLog(`✅ ${targetLogin} принял звонок!`, 'success');
                await startTalking(true);
            } else if (data && data.status === 'rejected') {
                clearInterval(checkInterval);
                addLog(`❌ ${targetLogin} отклонил`, 'error');
                endCall();
            }
        }, 500);
        
        setTimeout(() => {
            clearInterval(checkInterval);
            if (!isCallActive) {
                addLog(`⏰ Нет ответа`, 'warn');
                endCall();
            }
        }, 30000);
    }
    
    // ========== ПРИЕМ ЗВОНКА ==========
    function setupCallListener() {
        db.ref('call_sessions').orderByChild('calleeId').equalTo(currentUser.id).on('child_added', (snap) => {
            const call = snap.val();
            if (call && call.status === 'ringing' && !isCallActive) {
                currentSessionId = snap.key;
                currentCallWith = { id: call.callerId, login: call.callerLogin };
                
                addLog(`📞 ВХОДЯЩИЙ ЗВОНОК от ${call.callerLogin}`, 'call');
                
                if (confirm(`📞 Звонок от ${call.callerLogin}\nОтветить?`)) {
                    snap.ref.update({ status: 'accepted' });
                    addLog(`✅ Принимаем звонок`, 'success');
                    startTalking(false);
                } else {
                    snap.ref.update({ status: 'rejected' });
                }
            }
        });
    }
    
    // ========== НАЧАЛО РАЗГОВОРА ==========
    async function startTalking(isCaller) {
        if (isCallActive) return;
        
        try {
            addLog(`🎤 Запрашиваем микрофон...`);
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            addLog(`✅ Микрофон готов`, 'success');
            
            peerConnection = new RTCPeerConnection(configuration);
            
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    db.ref(`call_sessions/${currentSessionId}/candidates`).push({
                        candidate: event.candidate,
                        from: currentUser.id
                    });
                }
            };
            
            // ========== ФИКС ЗВУКА ==========
            peerConnection.ontrack = (event) => {
                addLog(`📡 Получен аудиопоток!`, 'success');
                const audio = new Audio();
                audio.srcObject = event.streams[0];
                audio.volume = 1.0;
                audio.autoplay = false;
                
                const statusDiv = document.getElementById('callStatus');
                
                // Функция активации звука
                let soundActivated = false;
                const activateSound = async () => {
                    if (soundActivated) return;
                    try {
                        await audio.play();
                        soundActivated = true;
                        statusDiv.innerHTML = '🎙️ РАЗГОВОР (ЗВУК ЕСТЬ)';
                        statusDiv.style.background = '#4caf50';
                        statusDiv.style.cursor = 'default';
                        document.body.removeEventListener('click', activateSound);
                        document.body.removeEventListener('touchstart', activateSound);
                        statusDiv.removeEventListener('click', activateSound);
                        addLog(`🔊 Звук активирован!`, 'success');
                    } catch(e) {
                        addLog(`⚠️ Ошибка активации: ${e.message}`, 'warn');
                    }
                };
                
                // Вешаем обработчики на клик/тап
                document.body.addEventListener('click', activateSound);
                document.body.addEventListener('touchstart', activateSound);
                statusDiv.addEventListener('click', activateSound);
                statusDiv.innerHTML = '🔊 НАЖМИ ДЛЯ ВКЛЮЧЕНИЯ ЗВУКА';
                statusDiv.style.background = '#ff9800';
                statusDiv.style.cursor = 'pointer';
                
                isCallActive = true;
                document.getElementById('callBtn').style.display = 'none';
                document.getElementById('endCallBtn').style.display = 'inline-block';
            };
            
            peerConnection.onconnectionstatechange = () => {
                addLog(`🔗 Состояние: ${peerConnection.connectionState}`);
                if (peerConnection.connectionState === 'connected') {
                    addLog(`✅ WebRTC соединение установлено!`, 'success');
                } else if (peerConnection.connectionState === 'failed') {
                    addLog(`❌ Соединение не удалось`, 'error');
                    endCall();
                }
            };
            
            // Обмен ICE кандидатами
            db.ref(`call_sessions/${currentSessionId}/candidates`).on('child_added', async (snap) => {
                const data = snap.val();
                if (data && data.from !== currentUser.id && peerConnection) {
                    try {
                        await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                    } catch(e) {}
                }
            });
            
            if (isCaller) {
                addLog(`📡 Создаем Offer...`);
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                await db.ref(`call_sessions/${currentSessionId}/offer`).set({
                    sdp: offer.sdp,
                    type: offer.type,
                    from: currentUser.id
                });
                addLog(`✅ Offer отправлен`, 'success');
            } else {
                // Ждем offer
                const offerRef = db.ref(`call_sessions/${currentSessionId}/offer`);
                offerRef.once('value', async (snap) => {
                    const offer = snap.val();
                    if (offer) {
                        addLog(`📡 Получен Offer, создаем Answer...`);
                        await peerConnection.setRemoteDescription(new RTCSessionDescription({
                            type: offer.type,
                            sdp: offer.sdp
                        }));
                        const answer = await peerConnection.createAnswer();
                        await peerConnection.setLocalDescription(answer);
                        await db.ref(`call_sessions/${currentSessionId}/answer`).set({
                            sdp: answer.sdp,
                            type: answer.type,
                            from: currentUser.id
                        });
                        addLog(`✅ Answer отправлен`, 'success');
                    }
                });
                
                // Ждем answer если я звонящий
                if (isCaller) {
                    const answerRef = db.ref(`call_sessions/${currentSessionId}/answer`);
                    answerRef.once('value', async (snap) => {
                        const answer = snap.val();
                        if (answer) {
                            await peerConnection.setRemoteDescription(new RTCSessionDescription({
                                type: answer.type,
                                sdp: answer.sdp
                            }));
                            addLog(`✅ Answer применен`, 'success');
                        }
                    });
                }
            }
            
        } catch(e) {
            addLog(`❌ Ошибка: ${e.message}`, 'error');
            endCall();
        }
    }
    
    // ========== ЗАВЕРШЕНИЕ ==========
    async function endCall() {
        addLog(`🔴 Завершение звонка...`);
        
        if (currentSessionId) {
            await db.ref(`call_sessions/${currentSessionId}/status`).set('ended');
        }
        
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
        
        isCallActive = false;
        currentCallWith = null;
        currentSessionId = null;
        
        document.getElementById('callStatus').className = 'status idle';
        document.getElementById('callStatus').innerHTML = '⚪ Ожидание';
        document.getElementById('callBtn').style.display = 'inline-block';
        document.getElementById('endCallBtn').style.display = 'none';
        
        addLog(`✅ Звонок завершен`, 'info');
    }
    
    const saved = localStorage.getItem('user');
    if (saved) {
        currentUser = JSON.parse(saved);
        db.ref(`users/${currentUser.id}/online`).set(true);
        afterLogin();
    }
    
    addLog(`🚀 WebRTC ЗВОНКИ ЗАПУЩЕНЫ`, 'success');
    addLog(`📌 При звонке - НАЖМИ НА ЭКРАН чтобы включить звук`, 'call');
</script>
</body>
</html>
