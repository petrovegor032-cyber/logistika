<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AudioDisk - ТЕСТ ЗВОНКОВ FIX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 20px;
            margin: 16px 0;
            backdrop-filter: blur(10px);
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            margin: 8px 8px 0 0;
        }
        button.danger { background: #dc3545; }
        button.success { background: #28a745; }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 16px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .log {
            background: #0a0a0a;
            border-radius: 16px;
            padding: 12px;
            font-family: monospace;
            font-size: 11px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .status {
            padding: 8px 12px;
            border-radius: 20px;
            margin: 8px 0;
            font-size: 14px;
        }
        .status.active { background: #28a745; }
        .status.inactive { background: #dc3545; }
        .status.ringing { background: #ff9800; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        hr { margin: 16px 0; border-color: rgba(255,255,255,0.2); }
        .peer { border-left: 3px solid #667eea; padding-left: 16px; margin: 12px 0; }
        .volume-test { 
            background: #333; padding: 8px; border-radius: 12px; margin: 8px 0;
            display: flex; align-items: center; gap: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📞 ТЕСТ ЗВОНКОВ WebRTC v2 (с аудиофиксом)</h1>
    <p style="opacity:0.7;">✅ Соединение есть | 🔊 Аудио принудительное</p>
    
    <div class="card">
        <button onclick="testMicrophone()" style="background:#ff9800;">🎤 ТЕСТ МИКРОФОНА</button>
        <div id="micTestResult" style="margin-top:8px; font-size:12px;"></div>
    </div>
    
    <div class="card" id="authPanel">
        <h3>🔐 Авторизация</h3>
        <input type="text" id="loginInput" placeholder="Логин">
        <input type="password" id="passwordInput" placeholder="Пароль">
        <button onclick="register()">Регистрация</button>
        <button onclick="login()" class="success">Вход</button>
    </div>
    
    <div id="mainPanel" style="display:none;">
        <div class="card">
            <h3>👤 Вы: <span id="myLogin">-</span></h3>
            <div id="callStatus" class="status inactive">⚪ Ожидание</div>
        </div>
        
        <div class="card">
            <h3>📞 Управление звонком</h3>
            <input type="text" id="targetLogin" placeholder="Логин собеседника (например, 222)">
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <button id="callBtn" onclick="startCall()">📞 ПОЗВОНИТЬ</button>
                <button id="endCallBtn" onclick="endCall()" class="danger" style="display:none;">🔴 ЗАВЕРШИТЬ</button>
            </div>
        </div>
        
        <div class="card">
            <h3>📋 ДРУГИЕ ПОЛЬЗОВАТЕЛИ</h3>
            <div id="usersList"></div>
        </div>
        
        <div class="card">
            <h3>📋 ЛОГ ВЫЗОВОВ</h3>
            <button onclick="clearLog()">Очистить лог</button>
            <div id="log" class="log"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCCIY9lL15FpypsI310HCuTxQSwkpCpuiE",
        authDomain: "audiozvonok-b340d.firebaseapp.com",
        databaseURL: "https://audiozvonok-b340d-default-rtdb.firebaseio.com",
        projectId: "audiozvonok-b340d",
        storageBucket: "audiozvonok-b340d.firebasestorage.app"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentUser = null;
    let localStream = null;
    let peerConnection = null;
    let callActive = false;
    
    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' },
            { urls: 'stun:stun4.l.google.com:19302' }
        ]
    };
    
    // Разрешаем аудио после любого тача
    document.body.addEventListener('touchstart', () => {
        addLog(`👆 Тач зарегистрирован - аудио разрешено`, 'info');
    });
    
    document.body.addEventListener('click', () => {
        addLog(`🖱️ Клик зарегистрирован`, 'info');
    });
    
    async function testMicrophone() {
        addLog(`🎤 Тест микрофона...`);
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            addLog(`✅ Микрофон работает! Уровень сигнала:`, 'success');
            const audioContext = new AudioContext();
            const source = audioContext.createMediaStreamSource(stream);
            const analyser = audioContext.createAnalyser();
            source.connect(analyser);
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            let lastLevel = 0;
            const interval = setInterval(() => {
                analyser.getByteTimeDomainData(dataArray);
                let max = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    const v = (dataArray[i] - 128) / 128;
                    max = Math.max(max, Math.abs(v));
                }
                if (max > 0.05) {
                    document.getElementById('micTestResult').innerHTML = `🎙️ ГОВОРИТЕ! Уровень: ${Math.round(max * 100)}%`;
                    document.getElementById('micTestResult').style.color = '#4caf50';
                } else {
                    document.getElementById('micTestResult').innerHTML = `🔇 Тишина... скажите что-нибудь`;
                    document.getElementById('micTestResult').style.color = '#888';
                }
            }, 100);
            
            setTimeout(() => {
                clearInterval(interval);
                stream.getTracks().forEach(t => t.stop());
                audioContext.close();
                document.getElementById('micTestResult').innerHTML = `✅ Тест завершен`;
            }, 5000);
        } catch(e) {
            addLog(`❌ Ошибка микрофона: ${e.message}`, 'error');
            document.getElementById('micTestResult').innerHTML = `❌ Нет доступа к микрофону: ${e.message}`;
        }
    }
    
    function addLog(msg, type = 'info') {
        const logDiv = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        const colors = { info: '#aaa', success: '#4caf50', error: '#f44336', warn: '#ff9800', call: '#2196f3' };
        const logEntry = `<div style="color: ${colors[type] || colors.info}; border-bottom:1px solid #222; padding:4px 0;">[${time}] ${msg}</div>`;
        logDiv.innerHTML += logEntry;
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(`[${time}] ${msg}`);
    }
    
    function clearLog() {
        document.getElementById('log').innerHTML = '';
        addLog('📋 Лог очищен');
    }
    
    async function register() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return addLog('Введите логин и пароль', 'error');
        
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (snapshot.exists()) return addLog('Логин занят', 'error');
        
        const userId = Date.now().toString();
        await db.ref(`users/${userId}`).set({
            login, password: btoa(password), name: login, created_at: Date.now(), online: true
        });
        
        currentUser = { id: userId, login, name: login };
        localStorage.setItem('user', JSON.stringify(currentUser));
        addLog(`✅ Регистрация: ${login}`, 'success');
        afterLogin();
    }
    
    async function login() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return addLog('Введите логин и пароль', 'error');
        
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (!snapshot.exists()) return addLog('Пользователь не найден', 'error');
        
        let userId, userData;
        snapshot.forEach(child => { userId = child.key; userData = child.val(); });
        if (btoa(password) !== userData.password) return addLog('Неверный пароль', 'error');
        
        currentUser = { id: userId, login, name: userData.name };
        localStorage.setItem('user', JSON.stringify(currentUser));
        await db.ref(`users/${userId}/online`).set(true);
        addLog(`✅ Вход: ${login}`, 'success');
        afterLogin();
    }
    
    async function afterLogin() {
        document.getElementById('authPanel').style.display = 'none';
        document.getElementById('mainPanel').style.display = 'block';
        document.getElementById('myLogin').innerText = currentUser.login;
        addLog(`🔌 Инициализация WebRTC...`);
        await loadUsers();
        setupCallListener();
        addLog(`✅ Готов к звонкам!`, 'success');
    }
    
    async function loadUsers() {
        const snapshot = await db.ref('users').once('value');
        let html = '';
        snapshot.forEach(child => {
            const user = child.val();
            if (user.login !== currentUser.login) {
                html += `<div class="peer">
                    <strong>${user.login}</strong> (${user.name}) 
                    <span style="color:${user.online ? '#4caf50' : '#888'}">● ${user.online ? 'онлайн' : 'офлайн'}</span>
                    <button onclick="callTo('${user.login}')" style="padding:6px 12px; font-size:12px;">📞 Позвонить</button>
                </div>`;
            }
        });
        document.getElementById('usersList').innerHTML = html || '<div>Нет других пользователей</div>';
    }
    
    function callTo(login) {
        document.getElementById('targetLogin').value = login;
        startCall();
    }
    
    function setupCallListener() {
        if (!currentUser) return;
        
        const offerRef = db.ref(`calls/${currentUser.id}/offer`);
        offerRef.on('value', async (snap) => {
            const offerData = snap.val();
            if (offerData && !callActive && offerData.from !== currentUser.id) {
                addLog(`📞 ВХОДЯЩИЙ ЗВОНОК от ${offerData.fromLogin || offerData.from}`, 'call');
                
                if (confirm(`📞 Входящий звонок от ${offerData.fromLogin || offerData.from}\nОтветить?`)) {
                    addLog(`✅ Принимаем звонок`, 'success');
                    await acceptCall(offerData.from, offerData.offer);
                    await offerRef.remove();
                } else {
                    addLog(`❌ Отклонен`, 'error');
                    await offerRef.remove();
                }
            }
        });
    }
    
    async function startCall() {
        if (!currentUser) return addLog('❌ Сначала войдите', 'error');
        
        const targetLogin = document.getElementById('targetLogin').value.trim();
        if (!targetLogin) return addLog('❌ Введите логин собеседника', 'error');
        if (callActive) return addLog('❌ Звонок уже активен', 'warn');
        
        addLog(`🔍 Ищем ${targetLogin}...`);
        
        const snapshot = await db.ref('users').orderByChild('login').equalTo(targetLogin).once('value');
        if (!snapshot.exists()) return addLog(`❌ ${targetLogin} не найден`, 'error');
        
        let targetId, targetData;
        snapshot.forEach(child => { targetId = child.key; targetData = child.val(); });
        
        addLog(`✅ Найден: ${targetData.login}, онлайн: ${targetData.online ? 'да' : 'нет'}`, 'success');
        
        try {
            addLog(`🎤 Запрашиваем микрофон...`);
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            addLog(`✅ Микрофон получен`, 'success');
            
            // Тест микрофона перед звонком
            const audioContext = new AudioContext();
            const source = audioContext.createMediaStreamSource(localStream);
            const analyser = audioContext.createAnalyser();
            source.connect(analyser);
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            setTimeout(() => {
                analyser.getByteTimeDomainData(dataArray);
                let max = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    const v = (dataArray[i] - 128) / 128;
                    max = Math.max(max, Math.abs(v));
                }
                if (max > 0.05) {
                    addLog(`🎙️ Микрофон активен, уровень сигнала: ${Math.round(max * 100)}%`, 'success');
                } else {
                    addLog(`⚠️ Микрофон работает, но тихо. Поговорите громче!`, 'warn');
                }
                audioContext.close();
            }, 1000);
            
            peerConnection = new RTCPeerConnection(configuration);
            
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
                addLog(`➕ Добавлен трек: ${track.kind} ${track.label || ''}`);
            });
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    addLog(`🧊 ICE: ${event.candidate.type}`);
                    db.ref(`calls/${targetId}/candidates`).push({
                        candidate: {
                            candidate: event.candidate.candidate,
                            sdpMid: event.candidate.sdpMid,
                            sdpMLineIndex: event.candidate.sdpMLineIndex
                        },
                        from: currentUser.id,
                        fromLogin: currentUser.login,
                        timestamp: Date.now()
                    });
                }
            };
            
            peerConnection.ontrack = (event) => {
                addLog(`📡 ПОЛУЧЕН АУДИОПОТОК!`, 'success');
                const audio = new Audio();
                audio.srcObject = event.streams[0];
                audio.volume = 1.0;
                audio.autoplay = true;
                
                const tryPlay = async () => {
                    try {
                        await audio.play();
                        addLog(`🔊 АУДИО ВОСПРОИЗВОДИТСЯ!`, 'success');
                        callActive = true;
                        document.getElementById('callStatus').className = 'status active';
                        document.getElementById('callStatus').innerHTML = '🟢 ЗВОНОК АКТИВЕН + ЗВУК';
                        document.getElementById('callBtn').style.display = 'none';
                        document.getElementById('endCallBtn').style.display = 'inline-block';
                    } catch(e) {
                        addLog(`⚠️ Автовоспроизведение заблокировано: ${e.message}`, 'warn');
                        addLog(`👉 Коснись/кликни экран для активации звука`, 'warn');
                        
                        const activateSound = async () => {
                            try {
                                await audio.play();
                                addLog(`✅ Звук активирован после касания!`, 'success');
                                document.body.removeEventListener('touchstart', activateSound);
                                document.body.removeEventListener('click', activateSound);
                            } catch(e2) {}
                        };
                        document.body.addEventListener('touchstart', activateSound, { once: true });
                        document.body.addEventListener('click', activateSound, { once: true });
                        
                        callActive = true;
                        document.getElementById('callStatus').className = 'status active';
                        document.getElementById('callStatus').innerHTML = '🟢 ЗВОНОК АКТИВЕН (нажми на экран для звука)';
                        document.getElementById('callBtn').style.display = 'none';
                        document.getElementById('endCallBtn').style.display = 'inline-block';
                    }
                };
                tryPlay();
            };
            
            peerConnection.onconnectionstatechange = () => {
                addLog(`🔗 Состояние: ${peerConnection.connectionState}`);
                if (peerConnection.connectionState === 'connected') {
                    addLog(`✅ СОЕДИНЕНИЕ УСТАНОВЛЕНО!`, 'success');
                } else if (peerConnection.connectionState === 'failed') {
                    addLog(`❌ Соединение не удалось`, 'error');
                    endCall();
                } else if (peerConnection.connectionState === 'disconnected') {
                    addLog(`⚠️ Разрыв соединения`, 'warn');
                    endCall();
                }
            };
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            addLog(`✅ Offer создан`);
            
            await db.ref(`calls/${targetId}/offer`).set({
                offer: { type: offer.type, sdp: offer.sdp },
                from: currentUser.id,
                fromLogin: currentUser.login,
                timestamp: Date.now()
            });
            addLog(`✅ Offer отправлен`, 'success');
            
            document.getElementById('callStatus').className = 'status ringing';
            document.getElementById('callStatus').innerHTML = '📞 ЗВОНИМ...';
            document.getElementById('callBtn').style.display = 'none';
            
            const answerRef = db.ref(`calls/${currentUser.id}/answer`);
            const timeout = setTimeout(() => {
                if (!callActive) {
                    addLog(`⏰ Таймаут 30 сек - нет ответа`, 'warn');
                    endCall();
                }
            }, 30000);
            
            answerRef.once('value', async (snap) => {
                clearTimeout(timeout);
                const answerData = snap.val();
                if (answerData && peerConnection && !peerConnection.remoteDescription) {
                    addLog(`📡 Получен Answer`);
                    const answer = new RTCSessionDescription({
                        type: answerData.answer.type,
                        sdp: answerData.answer.sdp
                    });
                    await peerConnection.setRemoteDescription(answer);
                    await answerRef.remove();
                    addLog(`✅ Answer применен`, 'success');
                    
                    db.ref(`calls/${currentUser.id}/candidates`).on('child_added', async (candSnap) => {
                        if (peerConnection && candSnap.val().from !== currentUser.id) {
                            const candData = candSnap.val().candidate;
                            const candidate = new RTCIceCandidate({
                                candidate: candData.candidate,
                                sdpMid: candData.sdpMid,
                                sdpMLineIndex: candData.sdpMLineIndex
                            });
                            await peerConnection.addIceCandidate(candidate);
                        }
                    });
                }
            });
            
        } catch(e) {
            addLog(`❌ Ошибка: ${e.message}`, 'error');
            endCall();
        }
    }
    
    async function acceptCall(fromUserId, offer) {
        try {
            addLog(`🎤 Запрашиваем микрофон...`);
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            addLog(`✅ Микрофон получен`, 'success');
            
            peerConnection = new RTCPeerConnection(configuration);
            
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    db.ref(`calls/${fromUserId}/candidates`).push({
                        candidate: {
                            candidate: event.candidate.candidate,
                            sdpMid: event.candidate.sdpMid,
                            sdpMLineIndex: event.candidate.sdpMLineIndex
                        },
                        from: currentUser.id,
                        fromLogin: currentUser.login,
                        timestamp: Date.now()
                    });
                }
            };
            
            peerConnection.ontrack = (event) => {
                addLog(`📡 ПОЛУЧЕН АУДИОПОТОК от звонящего!`, 'success');
                const audio = new Audio();
                audio.srcObject = event.streams[0];
                audio.volume = 1.0;
                audio.autoplay = true;
                
                const tryPlay = async () => {
                    try {
                        await audio.play();
                        addLog(`🔊 ЗВУК ВОСПРОИЗВОДИТСЯ!`, 'success');
                        callActive = true;
                        document.getElementById('callStatus').className = 'status active';
                        document.getElementById('callStatus').innerHTML = '🟢 ЗВОНОК АКТИВЕН + ЗВУК';
                        document.getElementById('callBtn').style.display = 'none';
                        document.getElementById('endCallBtn').style.display = 'inline-block';
                    } catch(e) {
                        addLog(`⚠️ Автовоспроизведение заблокировано`, 'warn');
                        addLog(`👉 Коснись экрана для активации звука`, 'warn');
                        
                        const activateSound = async () => {
                            try {
                                await audio.play();
                                addLog(`✅ Звук активирован!`, 'success');
                            } catch(e2) {}
                            document.body.removeEventListener('touchstart', activateSound);
                            document.body.removeEventListener('click', activateSound);
                        };
                        document.body.addEventListener('touchstart', activateSound, { once: true });
                        document.body.addEventListener('click', activateSound, { once: true });
                        
                        callActive = true;
                        document.getElementById('callStatus').innerHTML = '🟢 ЗВОНОК АКТИВЕН (нажми на экран)';
                        document.getElementById('callBtn').style.display = 'none';
                        document.getElementById('endCallBtn').style.display = 'inline-block';
                    }
                };
                tryPlay();
            };
            
            peerConnection.onconnectionstatechange = () => {
                addLog(`🔗 Состояние: ${peerConnection.connectionState}`);
            };
            
            await peerConnection.setRemoteDescription(new RTCSessionDescription({
                type: offer.type,
                sdp: offer.sdp
            }));
            
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            await db.ref(`calls/${fromUserId}/answer`).set({
                answer: { type: answer.type, sdp: answer.sdp },
                from: currentUser.id,
                fromLogin: currentUser.login,
                timestamp: Date.now()
            });
            addLog(`✅ Answer отправлен`, 'success');
            
            db.ref(`calls/${currentUser.id}/candidates`).on('child_added', async (snap) => {
                if (peerConnection && snap.val().from !== currentUser.id) {
                    const candData = snap.val().candidate;
                    const candidate = new RTCIceCandidate({
                        candidate: candData.candidate,
                        sdpMid: candData.sdpMid,
                        sdpMLineIndex: candData.sdpMLineIndex
                    });
                    await peerConnection.addIceCandidate(candidate);
                }
            });
            
        } catch(e) {
            addLog(`❌ Ошибка принятия: ${e.message}`, 'error');
            endCall();
        }
    }
    
    function endCall() {
        addLog(`🔴 Завершение звонка...`);
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        callActive = false;
        document.getElementById('callStatus').className = 'status inactive';
        document.getElementById('callStatus').innerHTML = '⚪ Ожидание';
        document.getElementById('callBtn').style.display = 'inline-block';
        document.getElementById('endCallBtn').style.display = 'none';
        addLog(`✅ Звонок завершен`, 'info');
    }
    
    const saved = localStorage.getItem('user');
    if (saved) {
        currentUser = JSON.parse(saved);
        db.ref(`users/${currentUser.id}/online`).set(true);
        afterLogin();
    }
    
    addLog(`🚀 ТЕСТ ЗВОНКОВ v2 ЗАПУЩЕН`, 'success');
