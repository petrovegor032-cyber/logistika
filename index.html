<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AudioDisk - Мессенджер</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3a 50%, #0a0a2a 100%);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        
        /* Млечный путь - звездный фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 60px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 120px 50px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 200px 150px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 300px 250px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 400px 100px, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 500px 300px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 600px 180px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 700px 400px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 800px 50px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            background-repeat: repeat;
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }
        
        /* Стеклянная панель (glassmorphism) */
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .header {
            background: rgba(102, 126, 234, 0.3);
            backdrop-filter: blur(12px);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 1;
        }
        
        .menu-btn, .avatar {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .menu-btn:hover, .avatar:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }
        
        h2 { font-weight: 600; letter-spacing: 1px; text-shadow: 0 0 10px rgba(102,126,234,0.5); }
        
        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            position: relative;
            z-index: 1;
        }
        
        .tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            font-weight: 500;
        }
        
        .tab.active {
            border-bottom-color: #667eea;
            background: rgba(102, 126, 234, 0.2);
            text-shadow: 0 0 5px rgba(102,126,234,0.5);
        }
        
        .page {
            display: none;
            flex: 1;
            overflow-y: auto;
            position: relative;
            z-index: 1;
            padding: 12px;
        }
        
        .page.active { display: block; }
        
        .search {
            padding: 12px;
            margin-bottom: 12px;
        }
        
        .search input {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        
        .search input:focus {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(102,126,234,0.3);
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin: 8px 0;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .contact-item:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(4px);
            border-color: rgba(102,126,234,0.5);
        }
        
        .contact-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .chat-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a);
            z-index: 200;
            flex-direction: column;
        }
        
        .chat-container.active { display: flex; }
        
        .chat-header {
            background: rgba(102, 126, 234, 0.3);
            backdrop-filter: blur(12px);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.out {
            background: linear-gradient(135deg, #667eea, #764ba2);
            align-self: flex-end;
            border-radius: 18px 18px 4px 18px;
        }
        
        .message.in {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            align-self: flex-start;
            border-radius: 18px 18px 18px 4px;
        }
        
        .message-meta {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
        }
        
        .bottom-panel {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .message-input {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            resize: none;
            font-family: inherit;
            outline: none;
        }
        
        .btn-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .btn-icon:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(102,126,234,0.4);
        }
        
        #map {
            height: 55vh;
            width: 100%;
            border-radius: 20px;
            margin: 12px 0;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 28px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        
        .modal input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            outline: none;
        }
        
        .modal input:focus {
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102,126,234,0.3);
        }
        
        /* Уведомление */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 400;
            animation: slideUp 0.3s ease;
            border: 1px solid rgba(102,126,234,0.5);
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .ads-list {
            max-height: 30vh;
            overflow-y: auto;
        }
        
        .ad-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            padding: 12px;
            margin: 8px 0;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        ::-webkit-scrollbar {
            width: 5px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="header">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <h2>✨ AudioDisk</h2>
    <div class="avatar" onclick="showProfile()">😎</div>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchPage('chats')">💬 Чаты</div>
    <div class="tab" onclick="switchPage('map')">🗺️ Карта</div>
    <div class="tab" onclick="switchPage('contacts')">📞 Контакты</div>
</div>

<div id="page-chats" class="page active">
    <div class="search"><input type="text" id="chatSearch" placeholder="🔍 Поиск чатов..."></div>
    <div id="chatsList"></div>
</div>

<div id="page-map" class="page">
    <div id="map"></div>
    <div style="display: flex; gap: 8px; margin: 12px 0;">
        <input type="text" id="adSearch" placeholder="🔍 Поиск объявлений..." style="flex:1; padding:12px; border-radius:30px; border:none; background:rgba(255,255,255,0.1); color:white;">
        <button class="btn-icon" onclick="showAddAdModal()">➕</button>
    </div>
    <div id="adsList" class="ads-list"></div>
</div>

<div id="page-contacts" class="page">
    <div class="search"><input type="text" id="contactSearch" placeholder="🔍 Поиск контактов..."></div>
    <button class="btn-icon" onclick="openAddContactModal()" style="width: 90%; margin: 12px auto; display: block;">➕ Добавить контакт</button>
    <div id="contactsList"></div>
</div>

<div id="chatContainer" class="chat-container">
    <div class="chat-header">
        <button class="btn-icon" onclick="closeChat()" style="background:none; box-shadow:none;">←</button>
        <div style="flex:1"><div id="chatName" style="font-weight:bold"></div><div id="chatLogin" style="font-size:11px; opacity:0.7"></div></div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="bottom-panel">
        <button class="btn-icon" onclick="selectFile()">📎</button>
        <button class="btn-icon" id="recordBtn" onclick="toggleRecording()">🎤</button>
        <textarea class="message-input" id="messageInput" placeholder="Сообщение" rows="1"></textarea>
        <button class="btn-icon" onclick="sendMessage()">✏️</button>
        <input type="file" id="fileInput" style="display:none">
    </div>
</div>

<div id="authModal" class="modal active">
    <div class="modal-content">
        <h2 style="text-align:center">✨ AudioDisk</h2>
        <input type="text" id="loginInput" placeholder="Логин">
        <input type="password" id="passwordInput" placeholder="Пароль">
        <div style="display: flex; gap: 12px;">
            <button class="btn-icon" onclick="register()" style="flex:1; border-radius:30px;">Регистрация</button>
            <button class="btn-icon" onclick="login()" style="flex:1; border-radius:30px;">Вход</button>
        </div>
    </div>
</div>

<div id="addContactModal" class="modal">
    <div class="modal-content">
        <h3>➕ Добавить контакт</h3>
        <input type="text" id="contactLoginInput" placeholder="Логин друга">
        <button class="btn-icon" onclick="addContact()" style="width:100%; border-radius:30px;">Найти и добавить</button>
    </div>
</div>

<div id="addAdModal" class="modal">
    <div class="modal-content">
        <h3>📢 Новое объявление</h3>
        <input type="text" id="adTitle" placeholder="Что продаёте?">
        <input type="text" id="adPrice" placeholder="Цена">
        <button class="btn-icon" onclick="createAd()" style="width:100%; border-radius:30px;">Опубликовать</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    // ========== FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCCIY9lL15FpypsI310HCuTxQSwkpCpuiE",
        authDomain: "audiozvonok-b340d.firebaseapp.com",
        databaseURL: "https://audiozvonok-b340d-default-rtdb.firebaseio.com",
        projectId: "audiozvonok-b340d"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // ========== ПЕРЕМЕННЫЕ ==========
    let currentUser = null;
    let contacts = [];
    let chats = [];
    let currentChat = null;
    let map = null;
    let markers = [];
    let mediaRecorder = null;
    
    // ========== УВЕДОМЛЕНИЕ ==========
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? 'rgba(220,53,69,0.9)' : 'rgba(0,0,0,0.8)';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    // ========== АВТОРИЗАЦИЯ ==========
    async function register() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return showToast('❌ Введите логин и пароль', true);
        
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (snapshot.exists()) return showToast('❌ Логин занят', true);
        
        const userId = Date.now().toString();
        await db.ref(`users/${userId}`).set({
            login: login, password: btoa(password), name: login, avatar: '😎', created_at: Date.now()
        });
        
        currentUser = { id: userId, login: login, name: login, avatar: '😎' };
        localStorage.setItem('user', JSON.stringify(currentUser));
        closeModal('authModal');
        loadData();
        showToast('✅ Регистрация успешна!');
    }
    
    async function login() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return showToast('❌ Введите логин и пароль', true);
        
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (!snapshot.exists()) return showToast('❌ Пользователь не найден', true);
        
        let userId, userData;
        snapshot.forEach(child => { userId = child.key; userData = child.val(); });
        
        if (btoa(password) !== userData.password) return showToast('❌ Неверный пароль', true);
        
        currentUser = { id: userId, login: login, name: userData.name, avatar: userData.avatar || '😎' };
        localStorage.setItem('user', JSON.stringify(currentUser));
        closeModal('authModal');
        loadData();
        showToast('✅ Добро пожаловать!');
    }
    
    function checkAuth() {
        const saved = localStorage.getItem('user');
        if (saved) {
            currentUser = JSON.parse(saved);
            loadData();
        } else {
            openModal('authModal');
        }
    }
    
    // ========== АУДИО ==========
    async function toggleRecording() {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            document.getElementById('recordBtn').style.background = 'linear-gradient(135deg, #667eea, #764ba2)';
        } else {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = () => sendAudioMessage(reader.result);
                    reader.readAsDataURL(blob);
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                document.getElementById('recordBtn').style.background = '#dc3545';
                setTimeout(() => { if (mediaRecorder?.state === 'recording') toggleRecording(); }, 30000);
            } catch(e) { showToast('❌ Нет доступа к микрофону', true); }
        }
    }
    
    async function sendAudioMessage(base64) {
        if (!currentChat) return;
        const msgId = Date.now().toString();
        const msgData = { from: currentUser.id, to: currentChat.id, type: 'audio', content: base64, timestamp: Date.now() };
        await db.ref(`messages/${currentChat.id}/${currentUser.id}/${msgId}`).set(msgData);
        await db.ref(`messages/${currentUser.id}/${currentChat.id}/${msgId}`).set(msgData);
        loadMessages();
    }
    
    // ========== ФАЙЛЫ ==========
    function selectFile() { document.getElementById('fileInput').click(); }
    
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file || !currentChat) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            const msgId = Date.now().toString();
            const msgData = { from: currentUser.id, to: currentChat.id, type: 'file', name: file.name, content: ev.target.result, timestamp: Date.now() };
            await db.ref(`messages/${currentChat.id}/${currentUser.id}/${msgId}`).set(msgData);
            await db.ref(`messages/${currentUser.id}/${currentChat.id}/${msgId}`).set(msgData);
            loadMessages();
        };
        reader.readAsDataURL(file);
    };
    
    // ========== СООБЩЕНИЯ ==========
    async function sendMessage() {
        const text = document.getElementById('messageInput').value.trim();
        if (!text || !currentChat) return;
        const msgId = Date.now().toString();
        const msgData = { from: currentUser.id, to: currentChat.id, type: 'text', content: text, timestamp: Date.now() };
        await db.ref(`messages/${currentChat.id}/${currentUser.id}/${msgId}`).set(msgData);
        await db.ref(`messages/${currentUser.id}/${currentChat.id}/${msgId}`).set(msgData);
        document.getElementById('messageInput').value = '';
        loadMessages();
    }
    
    async function loadMessages() {
        if (!currentChat) return;
        const snapshot = await db.ref(`messages/${currentUser.id}/${currentChat.id}`).orderByKey().limitToLast(50).once('value');
        const messages = [];
        snapshot.forEach(child => messages.push(child.val()));
        messages.sort((a,b) => a.timestamp - b.timestamp);
        
        const container = document.getElementById('messages');
        container.innerHTML = messages.map(msg => `
            <div class="message ${msg.from === currentUser.id ? 'out' : 'in'}">
                <div>${msg.type === 'text' ? escapeHtml(msg.content) : 
                     msg.type === 'audio' ? `<audio controls src="${msg.content}"></audio>` : 
                     `<a href="${msg.content}" download="${msg.name}" style="color:white;">📎 ${msg.name}</a>`}</div>
                <div class="message-meta">${msg.from === currentUser.id ? 'Вы' : currentChat.name} • ${new Date(msg.timestamp).toLocaleTimeString()}</div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    // ========== КОНТАКТЫ ==========
    async function loadContacts() {
        const snapshot = await db.ref(`contacts/${currentUser.id}`).once('value');
        contacts = [];
        if (snapshot.exists()) {
            for (const [id, data] of Object.entries(snapshot.val())) {
                const userSnap = await db.ref(`users/${id}`).once('value');
                const user = userSnap.val();
                if (user) contacts.push({ id, login: user.login, name: data.name || user.login, avatar: user.avatar || '👤' });
            }
        }
        renderContacts();
    }
    
    async function addContact() {
        const login = document.getElementById('contactLoginInput').value.trim();
        if (!login) return;
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (!snapshot.exists()) return showToast('❌ Пользователь не найден', true);
        let contactId;
        snapshot.forEach(child => contactId = child.key);
        if (contactId === currentUser.id) return showToast('❌ Нельзя добавить себя', true);
        await db.ref(`contacts/${currentUser.id}/${contactId}`).set({ name: login, added_at: Date.now() });
        showToast('✅ Контакт добавлен');
        closeModal('addContactModal');
        loadContacts();
        loadChats();
    }
    
    // ========== ЧАТЫ ==========
    async function loadChats() {
        const snapshot = await db.ref(`messages/${currentUser.id}`).once('value');
        chats = [];
        if (snapshot.exists()) {
            for (const [contactId, msgs] of Object.entries(snapshot.val())) {
                const contact = contacts.find(c => c.id === contactId);
                if (contact) {
                    const lastMsg = Object.values(msgs).sort((a,b) => b.timestamp - a.timestamp)[0];
                    chats.push({ contact, lastMsg });
                }
            }
        }
        renderChats();
    }
    
    function openChat(contact) {
        currentChat = contact;
        document.getElementById('chatName').innerText = contact.name;
        document.getElementById('chatLogin').innerText = '@' + contact.login;
        document.getElementById('chatContainer').classList.add('active');
        loadMessages();
        
        const ref = db.ref(`messages/${currentUser.id}/${contact.id}`);
        ref.off();
        ref.on('child_added', () => loadMessages());
    }
    
    function closeChat() {
        currentChat = null;
        document.getElementById('chatContainer').classList.remove('active');
    }
    
    // ========== КАРТА ==========
    function initMap() {
        if (map) return;
        map = L.map('map').setView([55.751244, 37.618423], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);
        
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                if (window.userMarker) map.removeLayer(window.userMarker);
                window.userMarker = L.marker([latitude, longitude], {
                    icon: L.divIcon({ html: '<div style="background:#667eea; width:16px; height:16px; border-radius:50%; border:2px solid white;"></div>', iconSize: [16,16] })
                }).addTo(map);
                map.setView([latitude, longitude], 15);
                loadAds();
            }, () => showToast('⚠️ Включите геолокацию', true));
        }
    }
    
    async function loadAds() {
        const snapshot = await db.ref('ads').once('value');
        const ads = [];
        if (snapshot.exists()) snapshot.forEach(child => ads.push({ id: child.key, ...child.val() }));
        
        if (map) {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            ads.forEach(ad => {
                const marker = L.marker([ad.lat, ad.lng]).addTo(map);
                marker.bindPopup(`<b>${ad.title}</b><br>💰 ${ad.price}₽<br><small>${ad.userLogin}</small>`);
                markers.push(marker);
            });
        }
        
        const search = document.getElementById('adSearch')?.value.toLowerCase() || '';
        const filtered = ads.filter(ad => ad.title.toLowerCase().includes(search));
        document.getElementById('adsList').innerHTML = filtered.map(ad => `
            <div class="ad-card">
                <b>${escapeHtml(ad.title)}</b> - ${ad.price}₽<br>
                <small>📍 ${ad.lat.toFixed(4)}, ${ad.lng.toFixed(4)}</small><br>
                <small>👤 ${escapeHtml(ad.userLogin)}</small>
            </div>
        `).join('');
    }
    
    async function createAd() {
        const title = document.getElementById('adTitle').value.trim();
        const price = document.getElementById('adPrice').value.trim();
        if (!title || !price) return showToast('❌ Заполните поля', true);
        if (!window.userMarker) return showToast('❌ Включите геолокацию', true);
        const pos = window.userMarker.getLatLng();
        await db.ref(`ads/${Date.now()}`).set({
            title, price, lat: pos.lat, lng: pos.lng,
            userId: currentUser.id, userLogin: currentUser.login,
            timestamp: Date.now()
        });
        showToast('✅ Объявление опубликовано');
        closeModal('addAdModal');
        loadAds();
    }
    
    // ========== UI ==========
    function renderContacts() {
        const search = document.getElementById('contactSearch')?.value.toLowerCase() || '';
        const filtered = contacts.filter(c => c.name.toLowerCase().includes(search));
        document.getElementById('contactsList').innerHTML = filtered.map(c => `
            <div class="contact-item" onclick='openChat(${JSON.stringify(c).replace(/"/g, '&quot;')})'>
                <div class="contact-avatar">${c.avatar}</div>
                <div><b>${escapeHtml(c.name)}</b><br><small style="opacity:0.7">@${c.login}</small></div>
            </div>
        `).join('');
    }
    
    function renderChats() {
        const search = document.getElementById('chatSearch')?.value.toLowerCase() || '';
        const filtered = chats.filter(c => c.contact.name.toLowerCase().includes(search));
        document.getElementById('chatsList').innerHTML = filtered.map(c => `
            <div class="contact-item" onclick='openChat(${JSON.stringify(c.contact).replace(/"/g, '&quot;')})'>
                <div class="contact-avatar">${c.contact.avatar}</div>
                <div style="flex:1">
                    <b>${escapeHtml(c.contact.name)}</b><br>
                    <small style="opacity:0.7">${c.lastMsg.type === 'text' ? c.lastMsg.content.substring(0,30) : (c.lastMsg.type === 'audio' ? '🎤 Аудио' : '📎 Файл')}</small>
                </div>
                <small>${new Date(c.lastMsg.timestamp).toLocaleTimeString()}</small>
            </div>
        `).join('');
    }
    
    async function loadData() {
        await loadContacts();
        await loadChats();
        await loadAds();
        if (map) loadAds();
    }
    
    function switchPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`page-${page}`).classList.add('active');
        event.target.classList.add('active');
        if (page === 'map') { initMap(); setTimeout(() => map?.invalidateSize(), 100); loadAds(); }
    }
    
    function showProfile() { showToast(`👤 ${currentUser.login}\n🆔 ${currentUser.id}`); }
    function toggleMenu() { showToast('✨ Меню: профиль, выход'); }
    function openAddContactModal() { openModal('addContactModal'); }
    function showAddAdModal() { openModal('addAdModal'); }
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) || ''; }
    
    document.getElementById('messageInput')?.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
    
    document.getElementById('chatSearch')?.addEventListener('input', () => renderChats());
    document.getElementById('contactSearch')?.addEventListener('input', () => renderContacts());
    document.getElementById('adSearch')?.addEventListener('input', () => loadAds());
    
    checkAuth();
</script>
</body>
</html>
