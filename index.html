<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AudioDisk - РАЦИЯ (рабочая версия)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 20px;
            margin: 16px 0;
            backdrop-filter: blur(10px);
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            margin: 8px 8px 0 0;
        }
        button.danger { background: #dc3545; }
        button.success { background: #28a745; }
        button.call-active { background: #4caf50; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 16px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .log {
            background: #0a0a0a;
            border-radius: 16px;
            padding: 12px;
            font-family: monospace;
            font-size: 10px;
            max-height: 250px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .status {
            padding: 10px;
            border-radius: 16px;
            text-align: center;
            font-weight: bold;
        }
        .status.idle { background: #333; }
        .status.calling { background: #ff9800; }
        .status.talking { background: #4caf50; }
        .mic-level {
            height: 4px;
            background: #4caf50;
            width: 0%;
            transition: width 0.1s;
            margin-top: 8px;
            border-radius: 2px;
        }
        .peer { border-left: 3px solid #667eea; padding-left: 16px; margin: 12px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>📻 РАЦИЯ AudioDisk</h1>
    
    <div class="card" id="authPanel">
        <input type="text" id="loginInput" placeholder="Логин">
        <input type="password" id="passwordInput" placeholder="Пароль">
        <button onclick="register()">Регистрация</button>
        <button onclick="login()" class="success">Вход</button>
    </div>
    
    <div id="mainPanel" style="display:none;">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>👤 <span id="myLogin">-</span></h3>
                <div id="callStatus" class="status idle">⚪ Режим ожидания</div>
            </div>
            <div class="mic-level" id="micLevel"></div>
        </div>
        
        <div class="card">
            <h3>📞 Собеседник</h3>
            <input type="text" id="targetLogin" placeholder="Логин для звонка">
            <div style="display: flex; gap: 8px;">
                <button id="callBtn" onclick="startCall()">📞 ПОЗВОНИТЬ</button>
                <button id="endCallBtn" onclick="endCall()" class="danger" style="display:none;">🔴 ЗАВЕРШИТЬ</button>
            </div>
        </div>
        
        <div class="card">
            <h3>📋 Другие пользователи</h3>
            <div id="usersList"></div>
        </div>
        
        <div class="card">
            <h3>📋 ЛОГ</h3>
            <button onclick="clearLog()">Очистить</button>
            <div id="log" class="log"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCCIY9lL15FpypsI310HCuTxQSwkpCpuiE",
        authDomain: "audiozvonok-b340d.firebaseapp.com",
        databaseURL: "https://audiozvonok-b340d-default-rtdb.firebaseio.com",
        projectId: "audiozvonok-b340d",
        storageBucket: "audiozvonok-b340d.firebasestorage.app"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();
    
    let currentUser = null;
    let currentCallWith = null;
    let isCallActive = false;
    let mediaStream = null;
    let recordingLoop = null;
    let audioContext = null;
    let analyserNode = null;
    let animationFrame = null;
    let playQueue = [];
    let isPlaying = false;
    let currentSessionId = null;
    
    function addLog(msg, type = 'info') {
        const logDiv = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        const colors = { info: '#aaa', success: '#4caf50', error: '#f44336', warn: '#ff9800', call: '#2196f3', audio: '#9c27b0' };
        logDiv.innerHTML += `<div style="color: ${colors[type] || colors.info}; border-bottom:1px solid #222; padding:4px 0;">[${time}] ${msg}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(`[${time}] ${msg}`);
    }
    
    function clearLog() {
        document.getElementById('log').innerHTML = '';
        addLog('Лог очищен');
    }
    
    async function register() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return addLog('Введите логин и пароль', 'error');
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (snapshot.exists()) return addLog('Логин занят', 'error');
        const userId = Date.now().toString();
        await db.ref(`users/${userId}`).set({ login, password: btoa(password), name: login, created_at: Date.now(), online: true });
        currentUser = { id: userId, login, name: login };
        localStorage.setItem('user', JSON.stringify(currentUser));
        addLog(`✅ Регистрация: ${login}`, 'success');
        afterLogin();
    }
    
    async function login() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return addLog('Введите логин и пароль', 'error');
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (!snapshot.exists()) return addLog('Пользователь не найден', 'error');
        let userId, userData;
        snapshot.forEach(child => { userId = child.key; userData = child.val(); });
        if (btoa(password) !== userData.password) return addLog('Неверный пароль', 'error');
        currentUser = { id: userId, login, name: userData.name };
        localStorage.setItem('user', JSON.stringify(currentUser));
        await db.ref(`users/${userId}/online`).set(true);
        addLog(`✅ Вход: ${login}`, 'success');
        afterLogin();
    }
    
    async function afterLogin() {
        document.getElementById('authPanel').style.display = 'none';
        document.getElementById('mainPanel').style.display = 'block';
        document.getElementById('myLogin').innerText = currentUser.login;
        await loadUsers();
        setupCallListener();
        setupAudioReceiver();
        addLog(`🎤 Готов к звонкам`, 'success');
    }
    
    async function loadUsers() {
        const snapshot = await db.ref('users').once('value');
        let html = '';
        snapshot.forEach(child => {
            const user = child.val();
            if (user.login !== currentUser.login) {
                html += `<div class="peer"><strong>${user.login}</strong> <span style="color:${user.online ? '#4caf50' : '#888'}">●</span>
                    <button onclick="callTo('${user.login}')" style="padding:6px 12px; font-size:12px;">📞</button></div>`;
            }
        });
        document.getElementById('usersList').innerHTML = html || '<div>Нет других пользователей</div>';
    }
    
    function callTo(login) {
        document.getElementById('targetLogin').value = login;
        startCall();
    }
    
    // ========== ЗВОНОК ==========
    async function startCall() {
        if (isCallActive) return addLog('Уже в звонке', 'warn');
        
        const targetLogin = document.getElementById('targetLogin').value.trim();
        if (!targetLogin) return addLog('Введите логин', 'error');
        
        const snapshot = await db.ref('users').orderByChild('login').equalTo(targetLogin).once('value');
        if (!snapshot.exists()) return addLog(`❌ ${targetLogin} не найден`, 'error');
        
        let targetId;
        snapshot.forEach(child => { targetId = child.key; });
        
        currentSessionId = Date.now().toString();
        currentCallWith = { id: targetId, login: targetLogin };
        
        addLog(`📞 Звоним ${targetLogin}...`, 'call');
        document.getElementById('callStatus').className = 'status calling';
        document.getElementById('callStatus').innerHTML = '📞 ЗВОНИМ...';
        
        // Создаем сессию звонка
        await db.ref(`call_sessions/${currentSessionId}`).set({
            callerId: currentUser.id,
            callerLogin: currentUser.login,
            calleeId: targetId,
            calleeLogin: targetLogin,
            status: 'ringing',
            timestamp: Date.now()
        });
        
        // Ждем ответа
        const sessionRef = db.ref(`call_sessions/${currentSessionId}`);
        const checkInterval = setInterval(async () => {
            const snap = await sessionRef.once('value');
            const data = snap.val();
            if (data && data.status === 'accepted') {
                clearInterval(checkInterval);
                addLog(`✅ ${targetLogin} принял звонок!`, 'success');
                await startTalking();
            } else if (data && data.status === 'rejected') {
                clearInterval(checkInterval);
                addLog(`❌ ${targetLogin} отклонил`, 'error');
                endCall();
            } else if (data && data.status === 'ended') {
                clearInterval(checkInterval);
                endCall();
            }
        }, 500);
        
        // Таймаут 30 сек
        setTimeout(() => {
            clearInterval(checkInterval);
            if (!isCallActive) {
                addLog(`⏰ Нет ответа`, 'warn');
                endCall();
            }
        }, 30000);
    }
    
    // ========== ПРИЕМ ЗВОНКА ==========
    function setupCallListener() {
        db.ref('call_sessions').orderByChild('calleeId').equalTo(currentUser.id).on('child_added', (snap) => {
            const call = snap.val();
            if (call && call.status === 'ringing' && !isCallActive) {
                currentSessionId = snap.key;
                currentCallWith = { id: call.callerId, login: call.callerLogin };
                
                addLog(`📞 ВХОДЯЩИЙ ЗВОНОК от ${call.callerLogin}`, 'call');
                
                if (confirm(`📞 Звонок от ${call.callerLogin}\nОтветить?`)) {
                    snap.ref.update({ status: 'accepted' });
                    addLog(`✅ Принимаем звонок`, 'success');
                    startTalking();
                } else {
                    snap.ref.update({ status: 'rejected' });
                }
            }
        });
    }
    
    // ========== НАЧАЛО РАЗГОВОРА ==========
    async function startTalking() {
        if (isCallActive) return;
        isCallActive = true;
        
        document.getElementById('callStatus').className = 'status talking';
        document.getElementById('callStatus').innerHTML = '🎙️ РАЗГОВОР';
        document.getElementById('callBtn').style.display = 'none';
        document.getElementById('endCallBtn').style.display = 'inline-block';
        
        addLog(`🎤 Запуск микрофона...`, 'success');
        
        // Микрофон
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // Уровень микрофона
        audioContext = new AudioContext();
        const sourceNode = audioContext.createMediaStreamSource(mediaStream);
        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 256;
        sourceNode.connect(analyserNode);
        
        function updateMicLevel() {
            if (!isCallActive) return;
            const dataArray = new Uint8Array(analyserNode.frequencyBinCount);
            analyserNode.getByteTimeDomainData(dataArray);
            let max = 0;
            for (let i = 0; i < dataArray.length; i++) {
                const v = (dataArray[i] - 128) / 128;
                max = Math.max(max, Math.abs(v));
            }
            document.getElementById('micLevel').style.width = Math.min(100, max * 100) + '%';
            animationFrame = requestAnimationFrame(updateMicLevel);
        }
        updateMicLevel();
        
        // Запускаем цикл записи
        startRecordingLoop();
    }
    
    // ========== ЗАПИСЬ ПО 1 СЕКУНДЕ ==========
    async function startRecordingLoop() {
        if (!isCallActive || !mediaStream) return;
        
        const chunks = [];
        const recorder = new MediaRecorder(mediaStream);
        
        recorder.ondataavailable = (e) => {
            if (e.data.size > 0) chunks.push(e.data);
        };
        
        recorder.onstop = async () => {
            if (chunks.length === 0) {
                if (isCallActive) setTimeout(() => startRecordingLoop(), 50);
                return;
            }
            
            const blob = new Blob(chunks, { type: 'audio/webm' });
            if (blob.size > 500 && isCallActive && currentCallWith && currentSessionId) {
                addLog(`📤 Отправка (${Math.round(blob.size/1000)}KB)`, 'audio');
                
                const filename = `f_${Date.now()}_${Math.random()}.webm`;
                const storageRef = storage.ref(`sessions/${currentSessionId}/${currentUser.id}/${filename}`);
                await storageRef.put(blob);
                const url = await storageRef.getDownloadURL();
                
                await db.ref(`sessions/${currentSessionId}/messages`).push({
                    from: currentUser.id,
                    fromLogin: currentUser.login,
                    url: url,
                    timestamp: Date.now()
                });
            }
            
            if (isCallActive) setTimeout(() => startRecordingLoop(), 50);
        };
        
        recorder.start();
        setTimeout(() => {
            if (recorder.state === 'recording') recorder.stop();
        }, 950);
    }
    
    // ========== ПРИЕМ И ВОСПРОИЗВЕДЕНИЕ ==========
    function setupAudioReceiver() {
        if (!currentUser) return;
        
        // Слушаем все сессии где я участник
        db.ref('call_sessions').on('child_changed', (snap) => {
            const session = snap.val();
            if (session && (session.callerId === currentUser.id || session.calleeId === currentUser.id)) {
                if (session.status === 'ended') {
                    if (isCallActive) endCall();
                }
            }
        });
        
        // Слушаем сообщения в активной сессии
        setInterval(async () => {
            if (!currentSessionId || !isCallActive) return;
            
            const messagesRef = db.ref(`sessions/${currentSessionId}/messages`);
            const snapshot = await messagesRef.orderByChild('timestamp').limitToLast(5).once('value');
            
            snapshot.forEach((child) => {
                const msg = child.val();
                if (msg && msg.from !== currentUser.id && !msg.played) {
                    addLog(`📥 Получен фрагмент от ${msg.fromLogin}`, 'audio');
                    playAudioFragment(msg.url);
                    child.ref.update({ played: true });
                }
            });
        }, 200);
    }
    
    function playAudioFragment(url) {
        playQueue.push(url);
        if (!isPlaying) processQueue();
    }
    
    async function processQueue() {
        if (playQueue.length === 0) {
            isPlaying = false;
            return;
        }
        isPlaying = true;
        const url = playQueue.shift();
        const audio = new Audio(url);
        audio.volume = 1.0;
        
        try {
            await audio.play();
            audio.onended = () => processQueue();
        } catch(e) {
            addLog(`⚠️ Ошибка: ${e.message}`, 'warn');
            processQueue();
        }
    }
    
    // ========== ЗАВЕРШЕНИЕ ==========
    async function endCall() {
        addLog(`🔴 Завершение звонка...`);
        
        if (currentSessionId) {
            await db.ref(`call_sessions/${currentSessionId}/status`).set('ended');
        }
        
        isCallActive = false;
        
        if (recordingLoop) clearTimeout(recordingLoop);
        if (animationFrame) cancelAnimationFrame(animationFrame);
        if (audioContext) await audioContext.close();
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        
        mediaStream = null;
        audioContext = null;
        playQueue = [];
        isPlaying = false;
        
        currentCallWith = null;
        currentSessionId = null;
        
        document.getElementById('callStatus').className = 'status idle';
        document.getElementById('callStatus').innerHTML = '⚪ Режим ожидания';
        document.getElementById('callBtn').style.display = 'inline-block';
        document.getElementById('endCallBtn').style.display = 'none';
        document.getElementById('micLevel').style.width = '0%';
        
        addLog(`✅ Звонок завершен`, 'info');
    }
    
    const saved = localStorage.getItem('user');
    if (saved) {
        currentUser = JSON.parse(saved);
        db.ref(`users/${currentUser.id}/online`).set(true);
        afterLogin();
    }
    
    addLog(`🚀 РАЦИЯ ЗАПУЩЕНА`, 'success');
</script>
</body>
</html>
