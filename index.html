<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioDisk - Серверная логика</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #0F0C29; color: white; height: 100vh; display: flex; flex-direction: column; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .menu-btn, .avatar { background: rgba(255,255,255,0.2); border: none; color: white; font-size: 24px; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; }
        .tabs { display: flex; background: #1a1a2e; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { border-bottom-color: #667eea; background: rgba(102,126,234,0.2); }
        .page { display: none; flex: 1; overflow-y: auto; }
        .page.active { display: block; }
        .search { padding: 12px; background: rgba(255,255,255,0.05); }
        .search input { width: 100%; padding: 12px; border-radius: 30px; border: none; background: rgba(255,255,255,0.1); color: white; }
        .contact-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .contact-avatar { width: 50px; height: 50px; border-radius: 50%; background: #667eea; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 24px; }
        .chat-container { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0F0C29; z-index: 200; flex-direction: column; }
        .chat-container.active { display: flex; }
        .chat-header { background: #667eea; padding: 16px; display: flex; align-items: center; gap: 16px; }
        .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 75%; padding: 10px 14px; border-radius: 18px; }
        .message.out { background: #667eea; align-self: flex-end; }
        .message.in { background: #2a2a4a; align-self: flex-start; }
        .message-meta { font-size: 10px; opacity: 0.7; margin-top: 4px; }
        .bottom-panel { display: flex; gap: 8px; padding: 12px; background: #1a1a2e; }
        .message-input { flex: 1; padding: 12px; border-radius: 30px; border: none; background: rgba(255,255,255,0.1); color: white; }
        .btn-icon { width: 44px; height: 44px; border-radius: 50%; background: #667eea; border: none; color: white; font-size: 20px; cursor: pointer; }
        #map { height: 60vh; width: 100%; margin: 12px; border-radius: 16px; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 300; display: none; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a2e; border-radius: 24px; padding: 24px; width: 90%; max-width: 400px; }
        .modal input { width: 100%; padding: 12px; margin: 12px 0; border-radius: 12px; border: none; background: rgba(255,255,255,0.1); color: white; }
        .notification-badge { position: absolute; top: -5px; right: -5px; background: red; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; }
    </style>
</head>
<body>

<div class="header">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <h2>AudioDisk</h2>
    <div class="avatar" onclick="showProfile()">😎</div>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchPage('chats')">💬 Чаты</div>
    <div class="tab" onclick="switchPage('map')">🗺️ Карта</div>
    <div class="tab" onclick="switchPage('contacts')">📞 Контакты</div>
</div>

<div id="page-chats" class="page active">
    <div class="search"><input type="text" id="chatSearch" placeholder="Поиск чатов..."></div>
    <div id="chatsList"></div>
</div>

<div id="page-map" class="page">
    <div id="map"></div>
    <div style="padding: 12px; display: flex; gap: 8px;">
        <input type="text" id="adSearch" placeholder="Поиск объявлений..." style="flex:1; padding:10px; border-radius:30px; border:none; background:rgba(255,255,255,0.1); color:white;">
        <button class="btn-icon" onclick="showAddAdModal()">➕</button>
    </div>
    <div id="adsList" style="padding: 12px;"></div>
</div>

<div id="page-contacts" class="page">
    <div class="search"><input type="text" id="contactSearch" placeholder="Поиск контактов..."></div>
    <button class="btn-icon" onclick="openAddContactModal()" style="width: 90%; margin: 12px auto; display: block;">➕ Добавить контакт</button>
    <div id="contactsList"></div>
</div>

<div id="chatContainer" class="chat-container">
    <div class="chat-header">
        <button class="btn-icon" onclick="closeChat()" style="background:none;">←</button>
        <div style="flex:1"><div id="chatName"></div><div id="chatLogin" style="font-size:12px"></div></div>
        <button class="btn-icon" onclick="startCall()">📞</button>
    </div>
    <div class="messages" id="messages"></div>
    <div class="bottom-panel">
        <button class="btn-icon" onclick="selectFile()">📎</button>
        <button class="btn-icon" id="recordBtn" onclick="toggleRecording()">🎤</button>
        <textarea class="message-input" id="messageInput" placeholder="Сообщение" rows="1"></textarea>
        <button class="btn-icon" onclick="sendMessage()">✏️</button>
        <input type="file" id="fileInput" style="display:none">
    </div>
</div>

<div id="authModal" class="modal active">
    <div class="modal-content">
        <h2>🔐 AudioDisk</h2>
        <input type="text" id="loginInput" placeholder="Логин">
        <input type="password" id="passwordInput" placeholder="Пароль">
        <div style="display: flex; gap: 12px;">
            <button class="btn-icon" onclick="register()" style="flex:1">Регистрация</button>
            <button class="btn-icon" onclick="login()" style="flex:1">Вход</button>
        </div>
    </div>
</div>

<div id="addContactModal" class="modal">
    <div class="modal-content">
        <h2>➕ Добавить контакт</h2>
        <input type="text" id="contactLoginInput" placeholder="Логин друга">
        <button class="btn-icon" onclick="addContact()" style="width:100%">Найти</button>
    </div>
</div>

<div id="addAdModal" class="modal">
    <div class="modal-content">
        <h2>📢 Новое объявление</h2>
        <input type="text" id="adTitle" placeholder="Что продаёте?">
        <input type="text" id="adPrice" placeholder="Цена">
        <button class="btn-icon" onclick="createAd()" style="width:100%">Опубликовать</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyCCIY9lL15FpypsI310HCuTxQSwkpCpuiE",
        authDomain: "audiozvonok-b340d.firebaseapp.com",
        databaseURL: "https://audiozvonok-b340d-default-rtdb.firebaseio.com",
        projectId: "audiozvonok-b340d"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Глобальные переменные
    let currentUser = null;
    let contacts = [];
    let chats = [];
    let currentChat = null;
    let map = null;
    let markers = [];
    let peer = null;
    let localStream = null;
    let mediaRecorder = null;
    
    // ========== АВТОРИЗАЦИЯ ==========
    async function register() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return alert('Введите логин и пароль');
        
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (snapshot.exists()) return alert('Логин занят');
        
        const userId = Date.now().toString();
        await db.ref(`users/${userId}`).set({
            login: login,
            password: btoa(password),
            name: login,
            avatar: '😎',
            created_at: Date.now()
        });
        
        currentUser = { id: userId, login: login, name: login, avatar: '😎' };
        localStorage.setItem('user', JSON.stringify(currentUser));
        initPeer();
        closeModal('authModal');
        loadData();
        alert('✅ Регистрация успешна!');
    }
    
    async function login() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return alert('Введите логин и пароль');
        
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (!snapshot.exists()) return alert('Пользователь не найден');
        
        let userId, userData;
        snapshot.forEach(child => { userId = child.key; userData = child.val(); });
        
        if (btoa(password) !== userData.password) return alert('Неверный пароль');
        
        currentUser = { id: userId, login: login, name: userData.name, avatar: userData.avatar || '😎' };
        localStorage.setItem('user', JSON.stringify(currentUser));
        initPeer();
        closeModal('authModal');
        loadData();
        alert('✅ Вход выполнен');
    }
    
    function checkAuth() {
        const saved = localStorage.getItem('user');
        if (saved) {
            currentUser = JSON.parse(saved);
            initPeer();
            loadData();
        } else {
            openModal('authModal');
        }
    }
    
    // ========== ЗВОНКИ ==========
    function initPeer() {
        if (!currentUser) return;
        peer = new Peer(currentUser.id);
        peer.on('call', async (call) => {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            call.answer(localStream);
            call.on('stream', (stream) => {
                const audio = new Audio();
                audio.srcObject = stream;
                audio.play();
                alert('📞 Входящий звонок!');
            });
        });
    }
    
    async function startCall() {
        if (!currentChat) return;
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const call = peer.call(currentChat.id, localStream);
        call.on('stream', (stream) => {
            const audio = new Audio();
            audio.srcObject = stream;
            audio.play();
        });
    }
    
    // ========== АУДИО ==========
    async function toggleRecording() {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            document.getElementById('recordBtn').style.background = '#667eea';
        } else {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            const chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onload = () => sendAudioMessage(reader.result);
                reader.readAsDataURL(blob);
            };
            mediaRecorder.start();
            document.getElementById('recordBtn').style.background = 'red';
            setTimeout(() => mediaRecorder?.stop(), 30000);
        }
    }
    
    async function sendAudioMessage(base64) {
        const msgId = Date.now().toString();
        const msgData = {
            from: currentUser.id,
            to: currentChat.id,
            type: 'audio',
            content: base64,
            timestamp: Date.now()
        };
        await db.ref(`messages/${currentChat.id}/${currentUser.id}/${msgId}`).set(msgData);
        await db.ref(`messages/${currentUser.id}/${currentChat.id}/${msgId}`).set(msgData);
        loadMessages();
    }
    
    // ========== ФАЙЛЫ ==========
    function selectFile() { document.getElementById('fileInput').click(); }
    
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            const msgId = Date.now().toString();
            const msgData = {
                from: currentUser.id,
                to: currentChat.id,
                type: 'file',
                name: file.name,
                content: ev.target.result,
                timestamp: Date.now()
            };
            await db.ref(`messages/${currentChat.id}/${currentUser.id}/${msgId}`).set(msgData);
            await db.ref(`messages/${currentUser.id}/${currentChat.id}/${msgId}`).set(msgData);
            loadMessages();
        };
        reader.readAsDataURL(file);
    };
    
    // ========== СООБЩЕНИЯ ==========
    async function sendMessage() {
        const text = document.getElementById('messageInput').value.trim();
        if (!text || !currentChat) return;
        const msgId = Date.now().toString();
        const msgData = {
            from: currentUser.id,
            to: currentChat.id,
            type: 'text',
            content: text,
            timestamp: Date.now()
        };
        await db.ref(`messages/${currentChat.id}/${currentUser.id}/${msgId}`).set(msgData);
        await db.ref(`messages/${currentUser.id}/${currentChat.id}/${msgId}`).set(msgData);
        document.getElementById('messageInput').value = '';
        loadMessages();
        notifyUser(currentChat.id, text);
    }
    
    async function loadMessages() {
        if (!currentChat) return;
        const snapshot = await db.ref(`messages/${currentUser.id}/${currentChat.id}`).orderByKey().limitToLast(50).once('value');
        const messages = [];
        snapshot.forEach(child => messages.push(child.val()));
        messages.sort((a,b) => a.timestamp - b.timestamp);
        
        const container = document.getElementById('messages');
        container.innerHTML = messages.map(msg => `
            <div class="message ${msg.from === currentUser.id ? 'out' : 'in'}">
                <div>${msg.type === 'text' ? escapeHtml(msg.content) : 
                     msg.type === 'audio' ? `<audio controls src="${msg.content}"></audio>` : 
                     `<a href="${msg.content}" download="${msg.name}">📎 ${msg.name}</a>`}</div>
                <div class="message-meta">${msg.from === currentUser.id ? 'Вы' : currentChat.name} • ${new Date(msg.timestamp).toLocaleTimeString()}</div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    // ========== КОНТАКТЫ ==========
    async function loadContacts() {
        const snapshot = await db.ref(`contacts/${currentUser.id}`).once('value');
        contacts = [];
        if (snapshot.exists()) {
            for (const [id, data] of Object.entries(snapshot.val())) {
                const userSnap = await db.ref(`users/${id}`).once('value');
                const user = userSnap.val();
                if (user) contacts.push({ id, login: user.login, name: data.name || user.login, avatar: user.avatar || '👤' });
            }
        }
        renderContacts();
    }
    
    async function addContact() {
        const login = document.getElementById('contactLoginInput').value.trim();
        if (!login) return;
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (!snapshot.exists()) return alert('Пользователь не найден');
        let contactId;
        snapshot.forEach(child => contactId = child.key);
        if (contactId === currentUser.id) return alert('Нельзя добавить себя');
        await db.ref(`contacts/${currentUser.id}/${contactId}`).set({ name: login, added_at: Date.now() });
        alert('✅ Контакт добавлен');
        closeModal('addContactModal');
        loadContacts();
    }
    
    // ========== ЧАТЫ ==========
    async function loadChats() {
        const snapshot = await db.ref(`messages/${currentUser.id}`).once('value');
        chats = [];
        if (snapshot.exists()) {
            for (const [contactId, msgs] of Object.entries(snapshot.val())) {
                const contact = contacts.find(c => c.id === contactId);
                if (contact) {
                    const lastMsg = Object.values(msgs).sort((a,b) => b.timestamp - a.timestamp)[0];
                    chats.push({ contact, lastMsg });
                }
            }
        }
        renderChats();
    }
    
    function openChat(contact) {
        currentChat = contact;
        document.getElementById('chatName').innerText = contact.name;
        document.getElementById('chatLogin').innerText = '@' + contact.login;
        document.getElementById('chatContainer').classList.add('active');
        loadMessages();
        
        const ref = db.ref(`messages/${currentUser.id}/${contact.id}`);
        ref.off();
        ref.on('child_added', () => loadMessages());
    }
    
    function closeChat() {
        currentChat = null;
        document.getElementById('chatContainer').classList.remove('active');
    }
    
    // ========== КАРТА ==========
    function initMap() {
        if (map) return;
        map = L.map('map').setView([55.751244, 37.618423], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                if (window.userMarker) map.removeLayer(window.userMarker);
                window.userMarker = L.marker([latitude, longitude]).addTo(map);
                map.setView([latitude, longitude], 15);
            });
        }
    }
    
    async function loadAds() {
        const snapshot = await db.ref('ads').once('value');
        const ads = [];
        if (snapshot.exists()) snapshot.forEach(child => ads.push({ id: child.key, ...child.val() }));
        
        markers.forEach(m => map?.removeLayer(m));
        markers = [];
        ads.forEach(ad => {
            const marker = L.marker([ad.lat, ad.lng]).addTo(map);
            marker.bindPopup(`<b>${ad.title}</b><br>💰 ${ad.price}₽<br><small>${ad.userLogin}</small>`);
            markers.push(marker);
        });
        
        const search = document.getElementById('adSearch')?.value.toLowerCase() || '';
        const filtered = ads.filter(ad => ad.title.toLowerCase().includes(search));
        document.getElementById('adsList').innerHTML = filtered.map(ad => `
            <div style="background:rgba(255,255,255,0.1); padding:12px; margin:8px; border-radius:12px;">
                <b>${escapeHtml(ad.title)}</b> - ${ad.price}₽<br>
                <small>📍 ${ad.lat.toFixed(4)}, ${ad.lng.toFixed(4)}</small><br>
                <small>👤 ${ad.userLogin}</small>
            </div>
        `).join('');
    }
    
    async function createAd() {
        const title = document.getElementById('adTitle').value.trim();
        const price = document.getElementById('adPrice').value.trim();
        if (!title || !price) return alert('Заполните поля');
        if (!window.userMarker) return alert('Включите геолокацию');
        const pos = window.userMarker.getLatLng();
        await db.ref(`ads/${Date.now()}`).set({
            title, price, lat: pos.lat, lng: pos.lng,
            userId: currentUser.id, userLogin: currentUser.login,
            timestamp: Date.now()
        });
        alert('✅ Объявление опубликовано');
        closeModal('addAdModal');
        loadAds();
    }
    
    // ========== УВЕДОМЛЕНИЯ ==========
    async function notifyUser(userId, text) {
        await db.ref(`notifications/${userId}/${Date.now()}`).set({
            from: currentUser.id,
            text: text,
            timestamp: Date.now(),
            read: false
        });
    }
    
    // ========== UI ==========
    function renderContacts() {
        const search = document.getElementById('contactSearch')?.value.toLowerCase() || '';
        const filtered = contacts.filter(c => c.name.toLowerCase().includes(search));
        document.getElementById('contactsList').innerHTML = filtered.map(c => `
            <div class="contact-item" onclick='openChat(${JSON.stringify(c)})'>
                <div class="contact-avatar">${c.avatar}</div>
                <div><b>${escapeHtml(c.name)}</b><br><small>@${c.login}</small></div>
            </div>
        `).join('');
    }
    
    function renderChats() {
        const search = document.getElementById('chatSearch')?.value.toLowerCase() || '';
        const filtered = chats.filter(c => c.contact.name.toLowerCase().includes(search));
        document.getElementById('chatsList').innerHTML = filtered.map(c => `
            <div class="contact-item" onclick='openChat(${JSON.stringify(c.contact)})'>
                <div class="contact-avatar">${c.contact.avatar}</div>
                <div style="flex:1">
                    <b>${escapeHtml(c.contact.name)}</b><br>
                    <small>${c.lastMsg.type === 'text' ? c.lastMsg.content.substring(0,30) : (c.lastMsg.type === 'audio' ? '🎤 Аудио' : '📎 Файл')}</small>
                </div>
                <small>${new Date(c.lastMsg.timestamp).toLocaleTimeString()}</small>
            </div>
        `).join('');
    }
    
    async function loadData() {
        await loadContacts();
        await loadChats();
        await loadAds();
        if (map) loadAds();
    }
    
    function switchPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`page-${page}`).classList.add('active');
        if (page === 'map') { initMap(); setTimeout(() => map?.invalidateSize(), 100); loadAds(); }
        if (page === 'chats') loadChats();
        if (page === 'contacts') renderContacts();
    }
    
    function showProfile() { alert(`ID: ${currentUser.id}\nЛогин: ${currentUser.login}`); }
    function toggleMenu() { alert('Профиль • Выйти'); }
    function openAddContactModal() { openModal('addContactModal'); }
    function showAddAdModal() { openModal('addAdModal'); }
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    
    document.getElementById('messageInput')?.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
    
    document.getElementById('chatSearch')?.addEventListener('input', () => renderChats());
    document.getElementById('contactSearch')?.addEventListener('input', () => renderContacts());
    document.getElementById('adSearch')?.addEventListener('input', () => loadAds());
    
    checkAuth();
</script>
</body>
</html>
