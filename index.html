<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AudioDisk - РАЦИЯ (секундные фрагменты)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 20px;
            margin: 16px 0;
            backdrop-filter: blur(10px);
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            margin: 8px 8px 0 0;
        }
        button.danger { background: #dc3545; }
        button.success { background: #28a745; }
        button.call { background: #4caf50; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 16px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .log {
            background: #0a0a0a;
            border-radius: 16px;
            padding: 12px;
            font-family: monospace;
            font-size: 10px;
            max-height: 250px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .status {
            padding: 10px;
            border-radius: 16px;
            text-align: center;
            font-weight: bold;
        }
        .status.idle { background: #333; }
        .status.calling { background: #ff9800; }
        .status.talking { background: #4caf50; }
        .mic-level {
            height: 4px;
            background: #4caf50;
            width: 0%;
            transition: width 0.1s;
            margin-top: 8px;
            border-radius: 2px;
        }
        .peer { border-left: 3px solid #667eea; padding-left: 16px; margin: 12px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>📻 РАЦИЯ AudioDisk</h1>
    <p style="opacity:0.7;">Секундные фрагменты | Автовоспроизведение | Real-time диалог</p>
    
    <div class="card" id="authPanel">
        <input type="text" id="loginInput" placeholder="Логин">
        <input type="password" id="passwordInput" placeholder="Пароль">
        <button onclick="register()">Регистрация</button>
        <button onclick="login()" class="success">Вход</button>
    </div>
    
    <div id="mainPanel" style="display:none;">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>👤 <span id="myLogin">-</span></h3>
                <div id="callStatus" class="status idle">⚪ Режим ожидания</div>
            </div>
            <div class="mic-level" id="micLevel"></div>
        </div>
        
        <div class="card">
            <h3>📞 Собеседник</h3>
            <input type="text" id="targetLogin" placeholder="Логин для звонка">
            <div style="display: flex; gap: 8px;">
                <button id="callBtn" onclick="startCallRequest()">📞 ПОЗВОНИТЬ</button>
                <button id="endCallBtn" onclick="endCall()" class="danger" style="display:none;">🔴 ЗАВЕРШИТЬ</button>
            </div>
        </div>
        
        <div class="card">
            <h3>📋 Другие пользователи</h3>
            <div id="usersList"></div>
        </div>
        
        <div class="card">
            <h3>📋 ЛОГ ДИАЛОГА</h3>
            <button onclick="clearLog()">Очистить</button>
            <div id="log" class="log"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCCIY9lL15FpypsI310HCuTxQSwkpCpuiE",
        authDomain: "audiozvonok-b340d.firebaseapp.com",
        databaseURL: "https://audiozvonok-b340d-default-rtdb.firebaseio.com",
        projectId: "audiozvonok-b340d",
        storageBucket: "audiozvonok-b340d.firebasestorage.app"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();
    
    let currentUser = null;
    let currentCallWith = null;
    let isCallActive = false;
    let isRecording = false;
    let mediaStream = null;
    let mediaRecorder = null;
    let recordingInterval = null;
    let audioContext = null;
    let sourceNode = null;
    let analyserNode = null;
    let animationFrame = null;
    let playQueue = [];
    let isPlaying = false;
    
    function addLog(msg, type = 'info') {
        const logDiv = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        const colors = { info: '#aaa', success: '#4caf50', error: '#f44336', warn: '#ff9800', call: '#2196f3', audio: '#9c27b0' };
        logDiv.innerHTML += `<div style="color: ${colors[type] || colors.info}; border-bottom:1px solid #222; padding:4px 0;">[${time}] ${msg}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(`[${time}] ${msg}`);
    }
    
    function clearLog() {
        document.getElementById('log').innerHTML = '';
        addLog('Лог очищен');
    }
    
    async function register() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return addLog('Введите логин и пароль', 'error');
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (snapshot.exists()) return addLog('Логин занят', 'error');
        const userId = Date.now().toString();
        await db.ref(`users/${userId}`).set({ login, password: btoa(password), name: login, created_at: Date.now(), online: true });
        currentUser = { id: userId, login, name: login };
        localStorage.setItem('user', JSON.stringify(currentUser));
        addLog(`✅ Регистрация: ${login}`, 'success');
        afterLogin();
    }
    
    async function login() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return addLog('Введите логин и пароль', 'error');
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (!snapshot.exists()) return addLog('Пользователь не найден', 'error');
        let userId, userData;
        snapshot.forEach(child => { userId = child.key; userData = child.val(); });
        if (btoa(password) !== userData.password) return addLog('Неверный пароль', 'error');
        currentUser = { id: userId, login, name: userData.name };
        localStorage.setItem('user', JSON.stringify(currentUser));
        await db.ref(`users/${userId}/online`).set(true);
        addLog(`✅ Вход: ${login}`, 'success');
        afterLogin();
    }
    
    async function afterLogin() {
        document.getElementById('authPanel').style.display = 'none';
        document.getElementById('mainPanel').style.display = 'block';
        document.getElementById('myLogin').innerText = currentUser.login;
        await loadUsers();
        setupCallListener();
        setupAudioListener();
        addLog(`🎤 Готов к звонкам (секундные фрагменты)`, 'success');
    }
    
    async function loadUsers() {
        const snapshot = await db.ref('users').once('value');
        let html = '';
        snapshot.forEach(child => {
            const user = child.val();
            if (user.login !== currentUser.login) {
                html += `<div class="peer"><strong>${user.login}</strong> <span style="color:${user.online ? '#4caf50' : '#888'}">●</span>
                    <button onclick="callTo('${user.login}')" style="padding:6px 12px; font-size:12px;">📞</button></div>`;
            }
        });
        document.getElementById('usersList').innerHTML = html || '<div>Нет других пользователей</div>';
    }
    
    function callTo(login) {
        document.getElementById('targetLogin').value = login;
        startCallRequest();
    }
    
    // ========== ЗАПРОС ЗВОНКА ==========
    async function startCallRequest() {
        if (isCallActive) return addLog('Уже в звонке', 'warn');
        const targetLogin = document.getElementById('targetLogin').value.trim();
        if (!targetLogin) return addLog('Введите логин', 'error');
        
        const snapshot = await db.ref('users').orderByChild('login').equalTo(targetLogin).once('value');
        if (!snapshot.exists()) return addLog(`❌ ${targetLogin} не найден`, 'error');
        
        let targetId;
        snapshot.forEach(child => { targetId = child.key; });
        currentCallWith = { id: targetId, login: targetLogin };
        
        addLog(`📞 Звоним ${targetLogin}...`, 'call');
        document.getElementById('callStatus').className = 'status calling';
        document.getElementById('callStatus').innerHTML = '📞 ЗВОНИМ...';
        
        const offerRef = db.ref(`call_requests/${targetId}`);
        await offerRef.set({
            from: currentUser.id,
            fromLogin: currentUser.login,
            timestamp: Date.now(),
            status: 'ringing'
        });
        
        // Ожидание ответа 20 секунд
        const responseRef = db.ref(`call_requests/${currentUser.id}/response`);
        const timeout = setTimeout(() => {
            if (!isCallActive) {
                addLog(`⏰ Нет ответа`, 'warn');
                endCall();
            }
        }, 20000);
        
        responseRef.once('value', async (snap) => {
            clearTimeout(timeout);
            const resp = snap.val();
            if (resp && resp.accepted) {
                addLog(`✅ ${targetLogin} принял звонок!`, 'success');
                await startTalkSession();
                await responseRef.remove();
            } else if (resp && !resp.accepted) {
                addLog(`❌ ${targetLogin} отклонил`, 'error');
                endCall();
            }
        });
    }
    
    // ========== СЛУШАЕМ ВХОДЯЩИЕ ЗВОНКИ ==========
    function setupCallListener() {
        db.ref(`call_requests/${currentUser.id}`).on('value', async (snap) => {
            const data = snap.val();
            if (data && data.from && !isCallActive && data.status === 'ringing') {
                addLog(`📞 ВХОДЯЩИЙ ЗВОНОК от ${data.fromLogin}`, 'call');
                const accept = confirm(`📞 Звонок от ${data.fromLogin}\nОтветить?`);
                
                if (accept) {
                    await db.ref(`call_requests/${currentUser.id}/response`).set({ accepted: true });
                    currentCallWith = { id: data.from, login: data.fromLogin };
                    addLog(`✅ Принимаем звонок`, 'success');
                    await startTalkSession();
                } else {
                    await db.ref(`call_requests/${currentUser.id}/response`).set({ accepted: false });
                }
                await snap.ref.remove();
            }
        });
    }
    
    // ========== НАЧАЛО СЕССИИ ==========
    async function startTalkSession() {
        if (isCallActive) return;
        isCallActive = true;
        
        document.getElementById('callStatus').className = 'status talking';
        document.getElementById('callStatus').innerHTML = '🎙️ РАЗГОВОР АКТИВЕН';
        document.getElementById('callBtn').style.display = 'none';
        document.getElementById('endCallBtn').style.display = 'inline-block';
        
        addLog(`🎤 Запуск микрофона и поштучная запись...`, 'success');
        
        // Запрашиваем микрофон
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // Для уровня микрофона
        audioContext = new AudioContext();
        sourceNode = audioContext.createMediaStreamSource(mediaStream);
        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 256;
        sourceNode.connect(analyserNode);
        
        function updateMicLevel() {
            if (!isCallActive) return;
            const dataArray = new Uint8Array(analyserNode.frequencyBinCount);
            analyserNode.getByteTimeDomainData(dataArray);
            let max = 0;
            for (let i = 0; i < dataArray.length; i++) {
                const v = (dataArray[i] - 128) / 128;
                max = Math.max(max, Math.abs(v));
            }
            const level = Math.min(100, max * 100);
            document.getElementById('micLevel').style.width = level + '%';
            animationFrame = requestAnimationFrame(updateMicLevel);
        }
        updateMicLevel();
        
        // ЗАПИСЬ ПО 1 СЕКУНДЕ
        startRecordingLoop();
    }
    
    // ЦИКЛИЧЕСКАЯ ЗАПИСЬ
    function startRecordingLoop() {
        if (!isCallActive) return;
        
        const chunks = [];
        const stream = mediaStream;
        
        const recorder = new MediaRecorder(stream);
        recorder.ondataavailable = (e) => {
            if (e.data.size > 0) {
                chunks.push(e.data);
            }
        };
        
        recorder.onstop = async () => {
            if (chunks.length === 0) return;
            const blob = new Blob(chunks, { type: 'audio/webm' });
            if (blob.size > 1000 && isCallActive && currentCallWith) {
                addLog(`📤 Отправка фрагмента (${Math.round(blob.size/1000)}KB)`, 'audio');
                await sendAudioFragment(blob);
            }
            // Следующая запись
            if (isCallActive) {
                setTimeout(() => startRecordingLoop(), 50);
            }
        };
        
        recorder.start();
        setTimeout(() => {
            if (recorder.state === 'recording') recorder.stop();
        }, 950);
    }
    
    // ОТПРАВКА ФРАГМЕНТА
    async function sendAudioFragment(blob) {
        if (!currentCallWith) return;
        
        const filename = `fragment_${Date.now()}_${Math.random()}.webm`;
        const storageRef = storage.ref(`call_fragments/${currentCallWith.id}/${currentUser.id}/${filename}`);
        
        try {
            await storageRef.put(blob);
            const url = await storageRef.getDownloadURL();
            
            await db.ref(`call_fragments/${currentCallWith.id}/incoming`).push({
                from: currentUser.id,
                fromLogin: currentUser.login,
                url: url,
                timestamp: Date.now()
            });
        } catch(e) {
            addLog(`❌ Ошибка отправки: ${e.message}`, 'error');
        }
    }
    
    // СЛУШАЕМ ВХОДЯЩИЕ ФРАГМЕНТЫ
    function setupAudioListener() {
        if (!currentUser) return;
        
        const fragmentsRef = db.ref(`call_fragments/${currentUser.id}/incoming`);
        fragmentsRef.on('child_added', (snap) => {
            const data = snap.val();
            if (data && isCallActive) {
                addLog(`📥 Получен фрагмент от ${data.fromLogin}`, 'audio');
                playAudioFragment(data.url);
                snap.ref.remove();
            } else if (data && !isCallActive) {
                snap.ref.remove();
            }
        });
    }
    
    // ОЧЕРЕДЬ ВОСПРОИЗВЕДЕНИЯ
    function playAudioFragment(url) {
        playQueue.push(url);
        if (!isPlaying) {
            processQueue();
        }
    }
    
    async function processQueue() {
        if (playQueue.length === 0) {
            isPlaying = false;
            return;
        }
        isPlaying = true;
        const url = playQueue.shift();
        const audio = new Audio(url);
        audio.volume = 1.0;
        
        try {
            await audio.play();
            addLog(`🔊 Фрагмент воспроизведен`, 'success');
            audio.onended = () => processQueue();
        } catch(e) {
            addLog(`⚠️ Ошибка воспроизведения: ${e.message}`, 'warn');
            processQueue();
        }
    }
    
    // ЗАВЕРШЕНИЕ ЗВОНКА
    async function endCall() {
        addLog(`🔴 Завершение звонка...`);
        isCallActive = false;
        
        if (recordingInterval) clearInterval(recordingInterval);
        if (animationFrame) cancelAnimationFrame(animationFrame);
        if (audioContext) await audioContext.close();
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        
        mediaStream = null;
        audioContext = null;
        analyserNode = null;
        sourceNode = null;
        playQueue = [];
        isPlaying = false;
        
        if (currentCallWith) {
            await db.ref(`call_requests/${currentCallWith.id}`).remove();
            await db.ref(`call_requests/${currentUser.id}`).remove();
        }
        
        currentCallWith = null;
        document.getElementById('callStatus').className = 'status idle';
        document.getElementById('callStatus').innerHTML = '⚪ Режим ожидания';
        document.getElementById('callBtn').style.display = 'inline-block';
        document.getElementById('endCallBtn').style.display = 'none';
        document.getElementById('micLevel').style.width = '0%';
        
        addLog(`✅ Звонок завершен`, 'info');
    }
    
    const saved = localStorage.getItem('user');
    if (saved) {
        currentUser = JSON.parse(saved);
        db.ref(`users/${currentUser.id}/online`).set(true);
        afterLogin();
    }
    
    addLog(`🚀 РАЦИЯ РЕЖИМ ЗАПУЩЕН`, 'success');
    addLog(`📌 Секундные фрагменты записываются и отправляются автоматически`, 'info');
</script>
</body>
</html>
