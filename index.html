<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AudioDisk - ТЕСТ ЗВОНКОВ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 20px;
            margin: 16px 0;
            backdrop-filter: blur(10px);
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            margin: 8px 8px 0 0;
        }
        button.danger { background: #dc3545; }
        button.success { background: #28a745; }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 16px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .log {
            background: #0a0a0a;
            border-radius: 16px;
            padding: 12px;
            font-family: monospace;
            font-size: 11px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .status {
            padding: 8px 12px;
            border-radius: 20px;
            margin: 8px 0;
            font-size: 14px;
        }
        .status.active { background: #28a745; }
        .status.inactive { background: #dc3545; }
        .status.ringing { background: #ff9800; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        hr { margin: 16px 0; border-color: rgba(255,255,255,0.2); }
        .peer { border-left: 3px solid #667eea; padding-left: 16px; margin: 12px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>📞 ТЕСТ ЗВОНКОВ WebRTC</h1>
    <p style="opacity:0.7;">Логирование всех шагов | Firebase + WebRTC</p>
    
    <!-- Авторизация -->
    <div class="card" id="authPanel">
        <h3>🔐 Авторизация</h3>
        <input type="text" id="loginInput" placeholder="Логин">
        <input type="password" id="passwordInput" placeholder="Пароль">
        <button onclick="register()">Регистрация</button>
        <button onclick="login()" class="success">Вход</button>
    </div>
    
    <!-- Основная панель (видна после входа) -->
    <div id="mainPanel" style="display:none;">
        <div class="card">
            <h3>👤 Вы: <span id="myLogin">-</span></h3>
            <div id="callStatus" class="status inactive">⚪ Ожидание</div>
        </div>
        
        <div class="card">
            <h3>📞 Управление звонком</h3>
            <input type="text" id="targetLogin" placeholder="Логин собеседника (например, 222)">
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <button id="callBtn" onclick="startCall()">📞 ПОЗВОНИТЬ</button>
                <button id="endCallBtn" onclick="endCall()" class="danger" style="display:none;">🔴 ЗАВЕРШИТЬ</button>
            </div>
        </div>
        
        <div class="card">
            <h3>📋 ДРУГИЕ ПОЛЬЗОВАТЕЛИ</h3>
            <div id="usersList"></div>
        </div>
        
        <div class="card">
            <h3>📋 ЛОГ ВЫЗОВОВ</h3>
            <button onclick="clearLog()">Очистить лог</button>
            <div id="log" class="log"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    // ========== FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCCIY9lL15FpypsI310HCuTxQSwkpCpuiE",
        authDomain: "audiozvonok-b340d.firebaseapp.com",
        databaseURL: "https://audiozvonok-b340d-default-rtdb.firebaseio.com",
        projectId: "audiozvonok-b340d",
        storageBucket: "audiozvonok-b340d.firebasestorage.app"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // ========== ПЕРЕМЕННЫЕ ==========
    let currentUser = null;
    let localStream = null;
    let peerConnection = null;
    let callActive = false;
    let currentCallWith = null;
    
    // Конфигурация STUN серверов
    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' },
            { urls: 'stun:stun4.l.google.com:19302' }
        ]
    };
    
    // ========== ЛОГГИРОВАНИЕ ==========
    function addLog(msg, type = 'info') {
        const logDiv = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        const colors = { info: '#aaa', success: '#4caf50', error: '#f44336', warn: '#ff9800', call: '#2196f3' };
        const logEntry = `<div style="color: ${colors[type] || colors.info}; border-bottom:1px solid #222; padding:4px 0;">[${time}] ${msg}</div>`;
        logDiv.innerHTML += logEntry;
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(`[${time}] ${msg}`);
    }
    
    function clearLog() {
        document.getElementById('log').innerHTML = '';
        addLog('📋 Лог очищен');
    }
    
    // ========== АВТОРИЗАЦИЯ ==========
    async function register() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return addLog('Введите логин и пароль', 'error');
        
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (snapshot.exists()) return addLog('Логин занят', 'error');
        
        const userId = Date.now().toString();
        await db.ref(`users/${userId}`).set({
            login, password: btoa(password), name: login, created_at: Date.now(), online: true
        });
        
        currentUser = { id: userId, login, name: login };
        localStorage.setItem('user', JSON.stringify(currentUser));
        addLog(`✅ Регистрация: ${login} (ID: ${userId.substring(0,8)}...)`, 'success');
        afterLogin();
    }
    
    async function login() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return addLog('Введите логин и пароль', 'error');
        
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (!snapshot.exists()) return addLog('Пользователь не найден', 'error');
        
        let userId, userData;
        snapshot.forEach(child => { userId = child.key; userData = child.val(); });
        if (btoa(password) !== userData.password) return addLog('Неверный пароль', 'error');
        
        currentUser = { id: userId, login, name: userData.name };
        localStorage.setItem('user', JSON.stringify(currentUser));
        await db.ref(`users/${userId}/online`).set(true);
        addLog(`✅ Вход: ${login} (ID: ${userId.substring(0,8)}...)`, 'success');
        afterLogin();
    }
    
    async function afterLogin() {
        document.getElementById('authPanel').style.display = 'none';
        document.getElementById('mainPanel').style.display = 'block';
        document.getElementById('myLogin').innerText = currentUser.login;
        
        addLog(`🔌 Инициализация WebRTC...`);
        await loadUsers();
        setupCallListener();
        setupConnectionMonitor();
    }
    
    async function logout() {
        if (currentUser) await db.ref(`users/${currentUser.id}/online`).set(false);
        endCall();
        currentUser = null;
        localStorage.clear();
        document.getElementById('authPanel').style.display = 'block';
        document.getElementById('mainPanel').style.display = 'none';
        addLog('👋 Выход выполнен');
    }
    
    // ========== ЗАГРУЗКА ПОЛЬЗОВАТЕЛЕЙ ==========
    async function loadUsers() {
        const snapshot = await db.ref('users').once('value');
        let html = '';
        snapshot.forEach(child => {
            const user = child.val();
            if (user.login !== currentUser.login) {
                html += `<div class="peer">
                    <strong>${user.login}</strong> (${user.name}) 
                    <span style="color:${user.online ? '#4caf50' : '#888'}">● ${user.online ? 'онлайн' : 'офлайн'}</span>
                    <button onclick="callTo('${user.login}')" style="padding:6px 12px; font-size:12px;">📞 Позвонить</button>
                </div>`;
            }
        });
        document.getElementById('usersList').innerHTML = html || '<div>Нет других пользователей</div>';
    }
    
    function callTo(login) {
        document.getElementById('targetLogin').value = login;
        startCall();
    }
    
    // ========== МОНИТОРИНГ СОЕДИНЕНИЯ ==========
    function setupConnectionMonitor() {
        db.ref('.info/connected').on('value', (snap) => {
            addLog(`🔌 Firebase WebSocket: ${snap.val() ? 'ПОДКЛЮЧЕН ✅' : 'ОТКЛЮЧЕН ❌'}`, snap.val() ? 'success' : 'error');
        });
    }
    
    // ========== ОСНОВНАЯ ЛОГИКА ЗВОНКОВ ==========
    function setupCallListener() {
        if (!currentUser) return;
        
        addLog(`📡 Слушаю входящие звонки в /calls/${currentUser.id}/offer`);
        
        const offerRef = db.ref(`calls/${currentUser.id}/offer`);
        offerRef.on('value', async (snap) => {
            const offerData = snap.val();
            if (offerData && !callActive && offerData.from !== currentUser.id) {
                addLog(`📞 ВХОДЯЩИЙ ЗВОНОК от ${offerData.fromLogin || offerData.from}`, 'call');
                
                const answer = confirm(`📞 Входящий звонок от ${offerData.fromLogin || offerData.from}\nОтветить?`);
                
                if (answer) {
                    addLog(`✅ Принимаем звонок от ${offerData.fromLogin || offerData.from}`, 'success');
                    await acceptCall(offerData.from, offerData.offer);
                    await offerRef.remove();
                } else {
                    addLog(`❌ Отклонен звонок от ${offerData.fromLogin || offerData.from}`, 'error');
                    await offerRef.remove();
                }
            }
        });
        
        // Автоматическая очистка старых offer (более 30 секунд)
        setInterval(async () => {
            const snapshot = await offerRef.once('value');
            if (snapshot.exists()) {
                const data = snapshot.val();
                if (data.timestamp && Date.now() - data.timestamp > 30000) {
                    await offerRef.remove();
                    addLog('🧹 Очищен старый offer (таймаут 30с)', 'warn');
                }
            }
        }, 10000);
    }
    
    async function startCall() {
        if (!currentUser) {
            addLog('❌ Сначала войдите', 'error');
            return;
        }
        
        const targetLogin = document.getElementById('targetLogin').value.trim();
        if (!targetLogin) {
            addLog('❌ Введите логин собеседника', 'error');
            return;
        }
        
        if (callActive) {
            addLog('❌ Звонок уже активен', 'warn');
            return;
        }
        
        addLog(`🔍 Ищем пользователя ${targetLogin}...`);
        
        const snapshot = await db.ref('users').orderByChild('login').equalTo(targetLogin).once('value');
        if (!snapshot.exists()) {
            addLog(`❌ Пользователь ${targetLogin} не найден`, 'error');
            return;
        }
        
        let targetId, targetData;
        snapshot.forEach(child => { targetId = child.key; targetData = child.val(); });
        
        addLog(`✅ Найден: ${targetData.login} (ID: ${targetId.substring(0,8)}...), онлайн: ${targetData.online ? 'да' : 'нет'}`, 'success');
        
        if (!targetData.online) {
            addLog(`⚠️ ${targetLogin} не в сети! Звонок может не пройти.`, 'warn');
        }
        
        currentCallWith = { id: targetId, login: targetLogin };
        
        try {
            addLog(`🎤 Запрашиваем доступ к микрофону...`);
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            addLog(`✅ Микрофон доступен`, 'success');
            
            addLog(`🔧 Создаем RTCPeerConnection...`);
            peerConnection = new RTCPeerConnection(configuration);
            
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
                addLog(`➕ Добавлен трек: ${track.kind}`);
            });
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    addLog(`🧊 ICE кандидат: ${event.candidate.type} (${event.candidate.candidate.substring(0, 50)}...)`);
                    db.ref(`calls/${targetId}/candidates`).push({
                        candidate: {
                            candidate: event.candidate.candidate,
                            sdpMid: event.candidate.sdpMid,
                            sdpMLineIndex: event.candidate.sdpMLineIndex
                        },
                        from: currentUser.id,
                        fromLogin: currentUser.login,
                        timestamp: Date.now()
                    });
                }
            };
            
            peerConnection.ontrack = (event) => {
                addLog(`📡 ПОЛУЧЕН АУДИОПОТОК от собеседника!`, 'success');
                const audio = new Audio();
                audio.srcObject = event.streams[0];
                audio.play().catch(e => addLog(`⚠️ Автовоспроизведение заблокировано: ${e.message}`, 'warn'));
                document.getElementById('callStatus').className = 'status active';
                document.getElementById('callStatus').innerHTML = '🟢 ЗВОНОК АКТИВЕН';
                callActive = true;
                document.getElementById('callBtn').style.display = 'none';
                document.getElementById('endCallBtn').style.display = 'inline-block';
                addLog(`🔊 Звонок установлен! Говорите.`, 'success');
            };
            
            peerConnection.onconnectionstatechange = () => {
                addLog(`🔗 Состояние соединения: ${peerConnection.connectionState}`, 'info');
                if (peerConnection.connectionState === 'connected') {
                    addLog(`✅ Соединение установлено!`, 'success');
                } else if (peerConnection.connectionState === 'failed') {
                    addLog(`❌ Соединение не удалось (возможно нужен TURN сервер)`, 'error');
                    endCall();
                } else if (peerConnection.connectionState === 'disconnected') {
                    addLog(`⚠️ Соединение разорвано`, 'warn');
                    endCall();
                }
            };
            
            peerConnection.oniceconnectionstatechange = () => {
                addLog(`🧊 ICE состояние: ${peerConnection.iceConnectionState}`, 'info');
            };
            
            addLog(`📡 Создаем Offer...`);
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            addLog(`✅ Offer создан, отправляем...`);
            
            const offerData = {
                offer: { type: offer.type, sdp: offer.sdp },
                from: currentUser.id,
                fromLogin: currentUser.login,
                timestamp: Date.now()
            };
            await db.ref(`calls/${targetId}/offer`).set(offerData);
            addLog(`✅ Offer отправлен в /calls/${targetId}/offer`, 'success');
            
            document.getElementById('callStatus').className = 'status ringing';
            document.getElementById('callStatus').innerHTML = '📞 ЗВОНИМ... Ожидаем ответа';
            document.getElementById('callBtn').style.display = 'none';
            
            // Ожидание ответа
            const answerRef = db.ref(`calls/${currentUser.id}/answer`);
            const timeout = setTimeout(() => {
                if (!callActive) {
                    addLog(`⏰ Таймаут: собеседник не ответил за 30 секунд`, 'warn');
                    endCall();
                }
            }, 30000);
            
            answerRef.once('value', async (snap) => {
                clearTimeout(timeout);
                const answerData = snap.val();
                if (answerData && !callActive && peerConnection) {
                    addLog(`📡 Получен Answer, устанавливаем удаленное описание...`);
                    const answer = new RTCSessionDescription({
                        type: answerData.answer.type,
                        sdp: answerData.answer.sdp
                    });
                    await peerConnection.setRemoteDescription(answer);
                    await answerRef.remove();
                    addLog(`✅ Answer применен`, 'success');
                    
                    // Подписываемся на ICE кандидаты от собеседника
                    const candidatesRef = db.ref(`calls/${currentUser.id}/candidates`);
                    candidatesRef.on('child_added', async (candSnap) => {
                        if (peerConnection && candSnap.val().from !== currentUser.id) {
                            const candData = candSnap.val().candidate;
                            const candidate = new RTCIceCandidate({
                                candidate: candData.candidate,
                                sdpMid: candData.sdpMid,
                                sdpMLineIndex: candData.sdpMLineIndex
                            });
                            await peerConnection.addIceCandidate(candidate);
                            addLog(`🧊 Добавлен удаленный ICE кандидат`);
                        }
                    });
                }
            });
            
        } catch(e) {
            addLog(`❌ Ошибка звонка: ${e.message}`, 'error');
            endCall();
        }
    }
    
    async function acceptCall(fromUserId, offer) {
        try {
            addLog(`🎤 Запрашиваем микрофон для ответа...`);
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            addLog(`✅ Микрофон получен`, 'success');
            
            peerConnection = new RTCPeerConnection(configuration);
            
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
            
            peerConnection.ontrack = (event) => {
                addLog(`📡 ПОЛУЧЕН АУДИОПОТОК от звонящего!`, 'success');
                const audio = new Audio();
                audio.srcObject = event.streams[0];
                audio.play().catch(e => addLog(`⚠️ Автовоспроизведение: ${e.message}`, 'warn'));
                callActive = true;
                document.getElementById('callStatus').className = 'status active';
                document.getElementById('callStatus').innerHTML = '🟢 ЗВОНОК АКТИВЕН';
                document.getElementById('callBtn').style.display = 'none';
                document.getElementById('endCallBtn').style.display = 'inline-block';
                addLog(`🔊 Разговор начат!`, 'success');
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    db.ref(`calls/${fromUserId}/candidates`).push({
                        candidate: {
                            candidate: event.candidate.candidate,
                            sdpMid: event.candidate.sdpMid,
                            sdpMLineIndex: event.candidate.sdpMLineIndex
                        },
                        from: currentUser.id,
                        fromLogin: currentUser.login,
                        timestamp: Date.now()
                    });
                }
            };
            
            peerConnection.onconnectionstatechange = () => {
                addLog(`🔗 Состояние: ${peerConnection.connectionState}`);
                if (peerConnection.connectionState === 'failed' || peerConnection.connectionState === 'disconnected') {
                    endCall();
                }
            };
            
            addLog(`📡 Устанавливаем удаленное описание (Offer)...`);
            await peerConnection.setRemoteDescription(new RTCSessionDescription({
                type: offer.type,
                sdp: offer.sdp
            }));
            
            addLog(`📡 Создаем Answer...`);
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            await db.ref(`calls/${fromUserId}/answer`).set({
                answer: { type: answer.type, sdp: answer.sdp },
                from: currentUser.id,
                fromLogin: currentUser.login,
                timestamp: Date.now()
            });
            
            addLog(`✅ Answer отправлен`, 'success');
            
            // ICE кандидаты от звонящего
            const candidatesRef = db.ref(`calls/${currentUser.id}/candidates`);
            candidatesRef.on('child_added', async (snap) => {
                if (peerConnection && snap.val().from !== currentUser.id) {
                    const candData = snap.val().candidate;
                    const candidate = new RTCIceCandidate({
                        candidate: candData.candidate,
                        sdpMid: candData.sdpMid,
                        sdpMLineIndex: candData.sdpMLineIndex
                    });
                    await peerConnection.addIceCandidate(candidate);
                }
            });
            
        } catch(e) {
            addLog(`❌ Ошибка принятия звонка: ${e.message}`, 'error');
            endCall();
        }
    }
    
    function endCall() {
        addLog(`🔴 Завершение звонка...`);
        
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        
        callActive = false;
        currentCallWith = null;
        
        document.getElementById('callStatus').className = 'status inactive';
        document.getElementById('callStatus').innerHTML = '⚪ Ожидание';
        document.getElementById('callBtn').style.display = 'inline-block';
        document.getElementById('endCallBtn').style.display = 'none';
        
        addLog(`✅ Звонок завершен`, 'info');
    }
    
    // Автозагрузка при сохраненной сессии
    const saved = localStorage.getItem('user');
    if (saved) {
        currentUser = JSON.parse(saved);
        db.ref(`users/${currentUser.id}/online`).set(true);
        afterLogin();
    }
    
    addLog(`🚀 ТЕСТОВЫЙ КЛИЕНТ ЗАПУЩЕН`, 'success');
    addLog(`📌 Для теста: открой эту же страницу в двух браузерах/устройствах`, 'info');
    addLog(`📌 Войди как 222 на одном, как 111 на другом`, 'info');
    addLog(`📌 Нажми ПОЗВОНИТЬ - увидишь полный лог WebRTC`, 'call');
</script>
</body>
</html>
