<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AudioDisk - ТЕСТ АУДИО СООБЩЕНИЙ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 20px;
            margin: 16px 0;
            backdrop-filter: blur(10px);
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            margin: 8px 8px 0 0;
        }
        button.danger { background: #dc3545; }
        button.success { background: #28a745; }
        button.warning { background: #ff9800; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 16px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .log {
            background: #0a0a0a;
            border-radius: 16px;
            padding: 12px;
            font-family: monospace;
            font-size: 11px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .audio-message {
            background: rgba(102,126,234,0.3);
            border-radius: 16px;
            padding: 12px;
            margin: 8px 0;
        }
        audio { width: 100%; margin: 8px 0; }
        .recording { animation: pulse 0.5s infinite; background: #dc3545; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>
<div class="container">
    <h1>🎤 ТЕСТ АУДИО СООБЩЕНИЙ</h1>
    <p style="opacity:0.7;">Запись → Firebase Storage → Прослушивание</p>
    
    <div class="card" id="authPanel">
        <h3>🔐 Авторизация</h3>
        <input type="text" id="loginInput" placeholder="Логин">
        <input type="password" id="passwordInput" placeholder="Пароль">
        <button onclick="register()">Регистрация</button>
        <button onclick="login()" class="success">Вход</button>
    </div>
    
    <div id="mainPanel" style="display:none;">
        <div class="card">
            <h3>👤 Вы: <span id="myLogin">-</span></h3>
            <div id="recordStatus">⚪ Готов к записи</div>
        </div>
        
        <div class="card">
            <h3>📞 Аудио сообщение</h3>
            <input type="text" id="targetLogin" placeholder="Кому (логин)">
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <button id="recordBtn" onclick="startRecording()">🎤 НАЧАТЬ ЗАПИСЬ</button>
                <button id="stopBtn" onclick="stopRecording()" class="danger" style="display:none;">⏹️ ОСТАНОВИТЬ</button>
            </div>
            <div id="recordingTimer" style="font-size: 24px; text-align: center; margin: 12px 0;"></div>
        </div>
        
        <div class="card">
            <h3>📥 Входящие аудио сообщения</h3>
            <div id="incomingAudio"></div>
        </div>
        
        <div class="card">
            <h3>📋 ЛОГ</h3>
            <button onclick="clearLog()">Очистить</button>
            <div id="log" class="log"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCCIY9lL15FpypsI310HCuTxQSwkpCpuiE",
        authDomain: "audiozvonok-b340d.firebaseapp.com",
        databaseURL: "https://audiozvonok-b340d-default-rtdb.firebaseio.com",
        projectId: "audiozvonok-b340d",
        storageBucket: "audiozvonok-b340d.firebasestorage.app"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();
    
    let currentUser = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let recordingTimer = null;
    let seconds = 0;
    
    function addLog(msg, type = 'info') {
        const logDiv = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        const colors = { info: '#aaa', success: '#4caf50', error: '#f44336', warn: '#ff9800', audio: '#2196f3' };
        const logEntry = `<div style="color: ${colors[type] || colors.info}; border-bottom:1px solid #222; padding:4px 0;">[${time}] ${msg}</div>`;
        logDiv.innerHTML += logEntry;
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(`[${time}] ${msg}`);
    }
    
    function clearLog() {
        document.getElementById('log').innerHTML = '';
        addLog('📋 Лог очищен');
    }
    
    async function register() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return addLog('Введите логин и пароль', 'error');
        
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (snapshot.exists()) return addLog('Логин занят', 'error');
        
        const userId = Date.now().toString();
        await db.ref(`users/${userId}`).set({
            login, password: btoa(password), name: login, created_at: Date.now(), online: true
        });
        
        currentUser = { id: userId, login, name: login };
        localStorage.setItem('user', JSON.stringify(currentUser));
        addLog(`✅ Регистрация: ${login}`, 'success');
        afterLogin();
    }
    
    async function login() {
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!login || !password) return addLog('Введите логин и пароль', 'error');
        
        const snapshot = await db.ref('users').orderByChild('login').equalTo(login).once('value');
        if (!snapshot.exists()) return addLog('Пользователь не найден', 'error');
        
        let userId, userData;
        snapshot.forEach(child => { userId = child.key; userData = child.val(); });
        if (btoa(password) !== userData.password) return addLog('Неверный пароль', 'error');
        
        currentUser = { id: userId, login, name: userData.name };
        localStorage.setItem('user', JSON.stringify(currentUser));
        await db.ref(`users/${userId}/online`).set(true);
        addLog(`✅ Вход: ${login}`, 'success');
        afterLogin();
    }
    
    function afterLogin() {
        document.getElementById('authPanel').style.display = 'none';
        document.getElementById('mainPanel').style.display = 'block';
        document.getElementById('myLogin').innerText = currentUser.login;
        setupAudioListener();
        addLog(`✅ Готов к записи и отправке аудио`, 'success');
    }
    
    // ЗАПИСЬ АУДИО
    async function startRecording() {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            addLog('⚠️ Запись уже идет', 'warn');
            return;
        }
        
        const targetLogin = document.getElementById('targetLogin').value.trim();
        if (!targetLogin) {
            addLog('❌ Укажите получателя', 'error');
            return;
        }
        
        addLog(`🎤 Запрос доступа к микрофону...`);
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioChunks = [];
            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    audioChunks.push(event.data);
                }
            };
            
            mediaRecorder.onstop = async () => {
                addLog(`⏹️ Запись остановлена, обрабатываем...`);
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const audioUrl = URL.createObjectURL(audioBlob);
                
                // Для прослушивания на месте
                const tempAudio = new Audio(audioUrl);
                addLog(`🎵 Длительность: ${Math.round(audioBlob.size / 1000)} KB`, 'audio');
                
                // Отправляем
                await sendAudio(targetLogin, audioBlob);
                
                stream.getTracks().forEach(track => track.stop());
                URL.revokeObjectURL(audioUrl);
            };
            
            mediaRecorder.start(1000);
            addLog(`✅ Запись началась! Говорите...`, 'success');
            
            document.getElementById('recordBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
            document.getElementById('recordStatus').innerHTML = '🔴 ИДЕТ ЗАПИСЬ...';
            document.getElementById('recordStatus').className = 'recording';
            
            // Таймер
            seconds = 0;
            recordingTimer = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                document.getElementById('recordingTimer').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                if (seconds >= 60) {
                    addLog(`⏰ Автостоп через 60 секунд`, 'warn');
                    stopRecording();
                }
            }, 1000);
            
        } catch(e) {
            addLog(`❌ Ошибка доступа к микрофону: ${e.message}`, 'error');
        }
    }
    
    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            clearInterval(recordingTimer);
            document.getElementById('recordBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('recordStatus').innerHTML = '⚪ Готов к записи';
            document.getElementById('recordStatus').className = '';
            document.getElementById('recordingTimer').innerText = '';
            addLog(`⏹️ Запись остановлена`, 'info');
        }
    }
    
    // ОТПРАВКА АУДИО
    async function sendAudio(toLogin, audioBlob) {
        addLog(`📤 Поиск пользователя ${toLogin}...`);
        
        const snapshot = await db.ref('users').orderByChild('login').equalTo(toLogin).once('value');
        if (!snapshot.exists()) {
            addLog(`❌ Получатель ${toLogin} не найден`, 'error');
            return;
        }
        
        let targetId, targetData;
        snapshot.forEach(child => { targetId = child.key; targetData = child.val(); });
        
        addLog(`✅ Получатель найден: ${targetData.login}`, 'success');
        
        // Загружаем в Storage
        const filename = `audio_${Date.now()}.webm`;
        const storageRef = storage.ref(`audio_messages/${targetId}/${currentUser.id}/${filename}`);
        
        addLog(`☁️ Загрузка в Firebase Storage...`);
        
        try {
            const uploadTask = await storageRef.put(audioBlob);
            const downloadUrl = await storageRef.getDownloadURL();
            addLog(`✅ Аудио загружено, размер: ${Math.round(audioBlob.size / 1000)} KB`, 'success');
            
            // Сохраняем метаданные в Realtime Database
            const messageId = Date.now().toString();
            const messageData = {
                from: currentUser.id,
                fromLogin: currentUser.login,
                fromName: currentUser.name,
                to: targetId,
                toLogin: targetData.login,
                url: downloadUrl,
                duration: seconds,
                size: audioBlob.size,
                timestamp: Date.now(),
                read: false
            };
            
            await db.ref(`audio_messages/${targetId}/${messageId}`).set(messageData);
            await db.ref(`audio_messages/${currentUser.id}/${messageId}`).set(messageData);
            
            addLog(`✅ Аудио сообщение отправлено ${toLogin}!`, 'success');
            
        } catch(e) {
            addLog(`❌ Ошибка загрузки: ${e.message}`, 'error');
        }
    }
    
    // ПРОСЛУШИВАНИЕ ВХОДЯЩИХ
    function setupAudioListener() {
        if (!currentUser) return;
        
        const audioRef = db.ref(`audio_messages/${currentUser.id}`);
        audioRef.on('child_added', (snap) => {
            const msg = snap.val();
            if (!msg.read) {
                addLog(`📨 НОВОЕ АУДИО СООБЩЕНИЕ от ${msg.fromLogin} (${Math.round(msg.size/1000)} KB)`, 'audio');
                displayAudioMessage(msg, snap.key);
                snap.ref.update({ read: true });
            }
        });
    }
    
    function displayAudioMessage(msg, msgId) {
        const container = document.getElementById('incomingAudio');
        const existing = document.getElementById(`audio_${msgId}`);
        if (existing) return;
        
        const div = document.createElement('div');
        div.className = 'audio-message';
        div.id = `audio_${msgId}`;
        div.innerHTML = `
            <strong>📣 ${msg.fromLogin}</strong>
            <small>${new Date(msg.timestamp).toLocaleTimeString()}</small>
            <audio controls src="${msg.url}" preload="auto"></audio>
            <div style="display: flex; gap: 8px; margin-top: 8px;">
                <button onclick="replyTo('${msg.fromLogin}')" style="padding:6px 12px; font-size:12px;">📝 Ответить</button>
                <button onclick="deleteAudio('${msgId}')" style="padding:6px 12px; font-size:12px; background:#dc3545;">🗑️ Удалить</button>
            </div>
        `;
        container.prepend(div);
        
        // Автоматическое воспроизведение (требует взаимодействия)
        const audio = div.querySelector('audio');
        const playOnInteraction = () => {
            audio.play().catch(e => addLog(`⚠️ Автовоспроизведение: ${e.message}`, 'warn'));
            document.body.removeEventListener('click', playOnInteraction);
            document.body.removeEventListener('touchstart', playOnInteraction);
        };
        document.body.addEventListener('click', playOnInteraction, { once: true });
        document.body.addEventListener('touchstart', playOnInteraction, { once: true });
    }
    
    function replyTo(login) {
        document.getElementById('targetLogin').value = login;
        addLog(`✏️ Готов ответить ${login}. Нажми "Начать запись"`, 'info');
    }
    
    async function deleteAudio(msgId) {
        await db.ref(`audio_messages/${currentUser.id}/${msgId}`).remove();
        document.getElementById(`audio_${msgId}`)?.remove();
        addLog(`🗑️ Аудио сообщение удалено`, 'info');
    }
    
    // Автовход
    const saved = localStorage.getItem('user');
    if (saved) {
        currentUser = JSON.parse(saved);
        db.ref(`users/${currentUser.id}/online`).set(true);
        afterLogin();
    }
    
    addLog(`🚀 ТЕСТ АУДИО СООБЩЕНИЙ ЗАПУЩЕН`, 'success');
    addLog(`📌 Инструкция:`, 'info');
    addLog(`   1. Войдите как 111 (телефон) и 222 (компьютер)`, 'info');
    addLog(`   2. Укажите кому отправить (логин)`, 'info');
    addLog(`   3. Нажмите "Начать запись" -> скажите что-то -> "Остановить"`, 'info');
    addLog(`   4. У собеседника появится аудио для прослушивания`, 'info');
</script>
</body>
</html>
