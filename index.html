<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AudioDisk - Мессенджер</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #0F0C29; color: white; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #6B2E8A; padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .menu-btn { background: none; border: none; color: white; font-size: 28px; cursor: pointer; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: #FF6B6B; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .search { padding: 12px; background: rgba(255,255,255,0.1); }
        .search input { width: 100%; padding: 12px; border-radius: 30px; border: none; background: rgba(255,255,255,0.2); color: white; }
        .container { flex: 1; overflow-y: auto; }
        .contacts-list { padding: 12px; }
        .contact-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .contact-avatar { width: 50px; height: 50px; border-radius: 50%; background: #FF6B6B; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 24px; }
        .contact-info { flex: 1; }
        .contact-name { font-weight: bold; }
        .chat { display: none; flex-direction: column; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0F0C29; z-index: 100; }
        .chat.active { display: flex; }
        .chat-header { background: #6B2E8A; padding: 16px; display: flex; align-items: center; gap: 16px; }
        .chat-back { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 14px; }
        .message.in { background: #2a2a4a; align-self: flex-start; }
        .message.out { background: #6B2E8A; align-self: flex-end; }
        .message-time { font-size: 10px; color: #aaa; margin-top: 4px; text-align: right; }
        .bottom-panel { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: rgba(0,0,0,0.8); position: fixed; bottom: 0; left: 0; right: 0; }
        .message-input { flex: 1; padding: 10px 14px; border-radius: 30px; border: none; background: rgba(255,255,255,0.1); color: white; }
        .record-btn { width: 44px; height: 44px; border-radius: 50%; background: #6B2E8A; border: none; color: white; font-size: 20px; cursor: pointer; }
        .map-container { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200; background: #1a2a3a; }
        .map-container.active { display: block; }
        #map { height: 100%; width: 100%; }
        .map-controls { position: absolute; bottom: 20px; left: 10px; right: 10px; background: rgba(0,0,0,0.8); border-radius: 30px; padding: 10px; display: flex; gap: 8px; z-index: 201; }
        .map-controls input { flex: 1; padding: 10px; border-radius: 30px; border: none; }
        .map-controls button { background: #4CAF50; border: none; padding: 10px 20px; border-radius: 30px; color: white; cursor: pointer; }
        .close-map { position: absolute; top: 50px; right: 10px; background: #f44336; width: 44px; height: 44px; border-radius: 50%; border: none; color: white; font-size: 24px; cursor: pointer; z-index: 201; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 400; display: none; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1A1738; border-radius: 24px; padding: 24px; width: 90%; max-width: 400px; }
        .modal h2 { color: #FF6B6B; margin-bottom: 20px; }
        .modal-input { width: 100%; padding: 12px; margin-bottom: 16px; border-radius: 12px; border: none; background: rgba(255,255,255,0.1); color: white; }
        .modal-buttons { display: flex; gap: 12px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 30px; border: none; cursor: pointer; }
        .modal-btn-primary { background: #6B2E8A; color: white; }
        .modal-btn-secondary { background: rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body>

<div class="header">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <h1>AudioDisk</h1>
    <div class="avatar" onclick="openProfileModal()" id="headerAvatar">😎</div>
</div>

<div class="search">
    <input type="text" id="searchInput" placeholder="🔍 Поиск контактов..." oninput="filterContacts()">
</div>

<div class="container">
    <div class="contacts-list" id="contactsList"></div>
    <button class="record-btn" onclick="openAddContactModal()" style="width: 90%; margin: 16px auto; border-radius: 30px;">➕ Добавить контакт</button>
</div>

<div class="chat" id="chat">
    <div class="chat-header">
        <button class="chat-back" onclick="closeChat()">←</button>
        <div class="chat-info"><div class="chat-name" id="chatName">...</div></div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="bottom-panel">
        <textarea class="message-input" id="chatMessageText" placeholder="Сообщение" rows="1"></textarea>
        <button class="record-btn" onclick="sendText()">✏️</button>
    </div>
</div>

<div class="map-container" id="mapContainer">
    <div id="map"></div>
    <div class="map-controls">
        <input type="text" id="adText" placeholder="Что продаёте?">
        <input type="text" id="adPrice" placeholder="Цена" style="width: 80px;">
        <button onclick="createAd()">➕</button>
    </div>
    <button class="close-map" onclick="closeMap()">✕</button>
</div>

<div class="modal" id="authModal">
    <div class="modal-content">
        <h2>🔐 Авторизация</h2>
        <input type="text" class="modal-input" id="loginInput" placeholder="Логин">
        <input type="password" class="modal-input" id="passwordInput" placeholder="Пароль">
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-secondary" id="registerBtn">Регистрация</button>
            <button class="modal-btn modal-btn-primary" id="loginBtn">Вход</button>
        </div>
    </div>
</div>

<div class="modal" id="addContactModal">
    <div class="modal-content">
        <h2>➕ Добавить контакт</h2>
        <input type="text" class="modal-input" id="newContactId" placeholder="ID пользователя">
        <input type="text" class="modal-input" id="newContactName" placeholder="Имя">
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-secondary" onclick="closeModal('addContactModal')">Отмена</button>
            <button class="modal-btn modal-btn-primary" onclick="addContact()">Добавить</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    // ========== АЛЕРТЫ ДЛЯ ОТЛАДКИ ==========
    alert("🔵 Шаг 1: Скрипт начал загрузку");

    // ========== FIREBASE КОНФИГУРАЦИЯ ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCCIY9lL15FpypsI310HCuTxQSwkpCpuiE",
        authDomain: "audiozvonok-b340d.firebaseapp.com",
        databaseURL: "https://audiozvonok-b340d-default-rtdb.firebaseio.com",
        projectId: "audiozvonok-b340d",
        storageBucket: "audiozvonok-b340d.firebasestorage.app",
        messagingSenderId: "172196854367",
        appId: "1:172196854367:web:8ae1b63377a14305e139ea",
        measurementId: "G-E0P8X93H0Y"
    };

    alert("🔵 Шаг 2: Конфиг загружен, URL базы: " + firebaseConfig.databaseURL);

    // Инициализация Firebase
    try {
        firebase.initializeApp(firebaseConfig);
        alert("🔵 Шаг 3: Firebase инициализирован успешно!");
    } catch (e) {
        alert("🔴 ОШИБКА инициализации Firebase: " + e.message);
    }

    const db = firebase.database();
    alert("🔵 Шаг 4: База данных получена");

    // Проверка подключения к базе
    db.ref('.info/connected').on('value', (snap) => {
        if (snap.val() === true) {
            alert("🟢 Шаг 5: ПОДКЛЮЧЕНИЕ К FIREBASE УСТАНОВЛЕНО!");
        } else {
            alert("🔴 Шаг 5: НЕТ ПОДКЛЮЧЕНИЯ К FIREBASE");
        }
    });

    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let currentUser = null;
    let contacts = [];
    let currentChatContact = null;
    let map = null;
    let currentLocation = null;
    let adMarkers = [];

    // ========== АВТОРИЗАЦИЯ ==========
    async function register() {
        alert("🔵 Регистрация: начата");
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        
        if (!login || !password) { 
            alert('Введите логин и пароль'); 
            return;
        }
        
        alert("🔵 Регистрация: логин=" + login);
        
        try {
            const usersRef = db.ref('users');
            const snapshot = await usersRef.orderByChild('login').equalTo(login).get();
            
            if (snapshot.exists()) {
                alert('❌ Логин уже существует');
                return;
            }
            
            const userId = Date.now().toString();
            alert("🔵 Регистрация: создаем пользователя с ID=" + userId);
            
            await usersRef.child(userId).set({
                login: login,
                password: btoa(password),
                name: login,
                avatar: '😎',
                created_at: new Date().toISOString()
            });
            
            currentUser = { id: userId, login: login, name: login, avatar: '😎' };
            localStorage.setItem('user', JSON.stringify(currentUser));
            
            alert('✅ Регистрация успешна! Добро пожаловать, ' + login);
            closeModal('authModal');
            updateUI();
            loadContacts();
        } catch (e) {
            alert("🔴 ОШИБКА регистрации: " + e.message);
        }
    }
    
    async function login() {
        alert("🔵 Вход: начат");
        const login = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        
        if (!login || !password) { 
            alert('Введите логин и пароль'); 
            return;
        }
        
        alert("🔵 Вход: логин=" + login);
        
        try {
            const usersRef = db.ref('users');
            const snapshot = await usersRef.orderByChild('login').equalTo(login).get();
            
            if (!snapshot.exists()) {
                alert('❌ Пользователь не найден');
                return;
            }
            
            let userId = null;
            let userData = null;
            snapshot.forEach((child) => {
                userId = child.key;
                userData = child.val();
            });
            
            alert("🔵 Вход: найден пользователь ID=" + userId);
            
            if (btoa(password) !== userData.password) {
                alert('❌ Неверный пароль');
                return;
            }
            
            currentUser = { id: userId, login: login, name: userData.name, avatar: userData.avatar || '😎' };
            localStorage.setItem('user', JSON.stringify(currentUser));
            
            alert('✅ Вход выполнен! Добро пожаловать, ' + login);
            closeModal('authModal');
            updateUI();
            loadContacts();
        } catch (e) {
            alert("🔴 ОШИБКА входа: " + e.message);
        }
    }
    
    function checkAuth() {
        alert("🔵 Проверка авторизации");
        const saved = localStorage.getItem('user');
        if (saved) {
            currentUser = JSON.parse(saved);
            alert("✅ Пользователь авторизован: " + currentUser.login);
            updateUI();
            loadContacts();
        } else {
            alert("⚠️ Пользователь не авторизован, показываем модалку");
            openModal('authModal');
        }
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem('user');
        contacts = [];
        renderContacts();
        openModal('authModal');
        closeChat();
        alert("👋 Вы вышли из системы");
    }
    
    // ========== КОНТАКТЫ ==========
    async function loadContacts() {
        if (!currentUser) return;
        alert("🔵 Загрузка контактов для пользователя: " + currentUser.login);
        
        try {
            const contactsRef = db.ref('contacts/' + currentUser.id);
            const snapshot = await contactsRef.get();
            
            contacts = [];
            if (snapshot.exists()) {
                for (const [contactId, contactData] of Object.entries(snapshot.val())) {
                    const userSnapshot = await db.ref('users/' + contactId).get();
                    const userData = userSnapshot.val();
                    contacts.push({
                        id: contactId,
                        name: contactData.name || userData?.name || contactId,
                        avatar: userData?.avatar || '👤'
                    });
                }
            }
            alert("✅ Загружено контактов: " + contacts.length);
            renderContacts();
        } catch (e) {
            alert("🔴 Ошибка загрузки контактов: " + e.message);
        }
    }
    
    async function addContact() {
        const contactId = document.getElementById('newContactId').value.trim();
        const contactName = document.getElementById('newContactName').value.trim() || contactId;
        if (!contactId) return;
        
        alert("🔵 Добавление контакта: " + contactId);
        
        try {
            const userSnapshot = await db.ref('users/' + contactId).get();
            if (!userSnapshot.exists()) {
                alert('❌ Пользователь не найден');
                return;
            }
            
            await db.ref('contacts/' + currentUser.id + '/' + contactId).set({
                name: contactName,
                added_at: new Date().toISOString()
            });
            
            alert("✅ Контакт добавлен!");
            await loadContacts();
            closeModal('addContactModal');
            document.getElementById('newContactId').value = '';
            document.getElementById('newContactName').value = '';
        } catch (e) {
            alert("🔴 Ошибка добавления контакта: " + e.message);
        }
    }
    
    function renderContacts() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        let filtered = contacts;
        if (searchTerm) filtered = contacts.filter(c => c.name.toLowerCase().includes(searchTerm));
        
        const container = document.getElementById('contactsList');
        if (!filtered.length) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">📭 Нет контактов</div>';
            return;
        }
        container.innerHTML = filtered.map(c => `
            <div class="contact-item" onclick="openChat('${c.id}')">
                <div class="contact-avatar">${c.avatar}</div>
                <div class="contact-info">
                    <div class="contact-name">${escapeHtml(c.name)}</div>
                </div>
            </div>
        `).join('');
    }
    
    function filterContacts() { renderContacts(); }
    
    // ========== ЧАТ ==========
    async function openChat(contactId) {
        const contact = contacts.find(c => c.id === contactId);
        if (!contact) return;
        currentChatContact = contact;
        document.getElementById('chatName').textContent = contact.name;
        document.getElementById('chat').classList.add('active');
        await loadMessages();
        
        const messagesRef = db.ref('messages/' + currentUser.id + '/' + contactId);
        messagesRef.off();
        messagesRef.on('child_added', (snapshot) => {
            const msg = snapshot.val();
            if (msg.from === currentUser.id) return;
            appendMessage(msg.text, msg.time, false);
        });
    }
    
    function closeChat() {
        if (currentChatContact) {
            db.ref('messages/' + currentUser.id + '/' + currentChatContact.id).off();
        }
        document.getElementById('chat').classList.remove('active');
        currentChatContact = null;
    }
    
    async function loadMessages() {
        if (!currentChatContact) return;
        const messagesRef = db.ref('messages/' + currentUser.id + '/' + currentChatContact.id);
        const snapshot = await messagesRef.orderByKey().limitToLast(50).get();
        
        const messages = [];
        if (snapshot.exists()) {
            snapshot.forEach((child) => {
                messages.push(child.val());
            });
        }
        renderMessages(messages);
    }
    
    function renderMessages(messages) {
        const container = document.getElementById('messages');
        container.innerHTML = '';
        if (!messages.length) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">💬 Нет сообщений</div>';
            return;
        }
        messages.forEach(msg => {
            appendMessage(msg.text, msg.time, msg.from === currentUser.id);
        });
        container.scrollTop = container.scrollHeight;
    }
    
    function appendMessage(text, time, isOutgoing) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `message ${isOutgoing ? 'out' : 'in'}`;
        div.innerHTML = `<div>${escapeHtml(text)}</div><div class="message-time">${time}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
    
    async function sendText() {
        const input = document.getElementById('chatMessageText');
        const text = input.value.trim();
        if (!text || !currentChatContact) return;
        
        const time = new Date().toLocaleTimeString();
        const msgId = Date.now().toString();
        
        const msgData = {
            from: currentUser.id,
            text: text,
            time: time,
            timestamp: Date.now()
        };
        
        await db.ref('messages/' + currentUser.id + '/' + currentChatContact.id + '/' + msgId).set(msgData);
        await db.ref('messages/' + currentChatContact.id + '/' + currentUser.id + '/' + msgId).set(msgData);
        
        input.value = '';
        input.style.height = 'auto';
        appendMessage(text, time, true);
    }
    
    // ========== КАРТА И ОБЪЯВЛЕНИЯ ==========
    function initMap() {
        if (map) return;
        map = L.map('map').setView([55.751244, 37.618423], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);
        
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                currentLocation = { lat, lng };
                if (window.myMarker) map.removeLayer(window.myMarker);
                window.myMarker = L.marker([lat, lng]).addTo(map);
                map.setView([lat, lng], 15);
                loadAds();
            });
        }
    }
    
    async function loadAds() {
        if (!currentLocation) return;
        const snapshot = await db.ref('ads').get();
        adMarkers.forEach(m => map.removeLayer(m));
        adMarkers = [];
        
        if (snapshot.exists()) {
            const ads = snapshot.val();
            for (const [id, ad] of Object.entries(ads)) {
                const dist = getDistance(currentLocation.lat, currentLocation.lng, ad.lat, ad.lng);
                if (dist < 5000) {
                    const marker = L.marker([ad.lat, ad.lng]).addTo(map);
                    marker.bindPopup(`<b>${ad.text}</b><br>Цена: ${ad.price} руб`);
                    adMarkers.push(marker);
                }
            }
        }
    }
    
    async function createAd() {
        const text = document.getElementById('adText').value;
        const price = document.getElementById('adPrice').value;
        if (!text || !currentLocation) { alert('Введите текст и включите GPS'); return; }
        
        await db.ref('ads/' + Date.now()).set({
            user_id: currentUser.id,
            lat: currentLocation.lat,
            lng: currentLocation.lng,
            text: text,
            price: price,
            created_at: new Date().toISOString()
        });
        
        document.getElementById('adText').value = '';
        document.getElementById('adPrice').value = '';
        await loadAds();
    }
    
    function getDistance(lat1, lng1, lat2, lng2) {
        const R = 6371000;
        const φ1 = lat1 * Math.PI/180;
        const φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180;
        const Δλ = (lng2-lng1) * Math.PI/180;
        const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    
    function openMap() {
        document.getElementById('mapContainer').classList.add('active');
        if (!map) initMap();
        else { map.invalidateSize(); loadAds(); }
    }
    
    function closeMap() { document.getElementById('mapContainer').classList.remove('active'); }
    
    // ========== UI ФУНКЦИИ ==========
    function toggleMenu() { 
        const menu = document.getElementById('menu');
        if (menu) menu.classList.toggle('active');
    }
    function closeMenu() { 
        const menu = document.getElementById('menu');
        if (menu) menu.classList.remove('active');
    }
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function openProfileModal() { openModal('profileModal'); }
    function openAddContactModal() { openModal('addContactModal'); }
    function updateUI() {
        if (currentUser) {
            document.getElementById('headerAvatar').textContent = currentUser.avatar || '😎';
        }
    }
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    document.getElementById('registerBtn').onclick = register;
    document.getElementById('loginBtn').onclick = login;
    
    document.querySelectorAll('.modal').forEach(modal => {
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
    });
    
    const msgInput = document.getElementById('chatMessageText');
    if (msgInput) {
        msgInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, window.innerHeight * 0.33) + 'px';
        });
    }
    
    alert("🔵 Шаг 6: Вызов checkAuth()");
    checkAuth();
    alert("🔵 Шаг 7: Скрипт полностью загружен");
</script>
</body>
</html>
