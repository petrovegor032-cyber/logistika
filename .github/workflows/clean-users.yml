name: Clean inactive users
on:
  schedule:
    - cron: '0 2 * * *'  # Каждую ночь в 2:00
  workflow_dispatch:

jobs:
  clean-users:
    runs-on: ubuntu-latest
    steps:
      - name: Delete users inactive for 7+ days
        run: |
          # 7 дней в миллисекундах
          WEEK_AGO=$(($(date +%s%3N) - 604800000))
          
          # Удаляем пользователей с lastActive < WEEK_AGO
          curl -X DELETE "https://audiozvonok-b340d-default-rtdb.firebaseio.com/users.json?orderBy=\"lastActive\"&endAt=$WEEK_AGO" \
            2>/dev/null || true
          
          echo "✅ Неактивные пользователи удалены (последняя активность более 7 дней назад)"
