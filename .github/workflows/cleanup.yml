name: Clean old data
on:
  schedule:
    - cron: '0 */6 * * *'  # Каждые 6 часов
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: Delete expired ads
        run: |
          curl -X PATCH "https://audiozvonok-b340d-default-rtdb.firebaseio.com/ads.json" \
            -H "Content-Type: application/json" \
            -d '{"expired": true}' 2>/dev/null || true
          echo "Cleanup completed"
